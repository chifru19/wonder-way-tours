<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderWay | Kribi Collection</title>
    
    <meta name="description" content="Premium Kribi travel experiences. Curated tours and luxury escapes in Cameroon.">
    <link rel="icon" href="images/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Outfit:wght@200;400;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; scroll-behavior: smooth; margin: 0; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .active-tab { background: #fbbf24 !important; color: black !important; border-color: #fbbf24 !important; }
        
        /* Elements */
        .package-card, .service-row { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #1e293b; 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px);
        }
        .package-card:hover { transform: translateY(-12px); border-color: #fbbf24; box-shadow: 0 25px 50px -12px rgba(251, 191, 36, 0.3); }
        
        /* Form Styling */
        input, textarea { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        input:focus, textarea:focus { border-color: #fbbf24 !important; outline: none; }
        .star-rating label { transition: color 0.2s ease; color: #334155; }
        .star-rating label:hover, .star-rating label:hover ~ label, .star-rating input:checked ~ label { color: #fbbf24 !important; }

        /* Review Feed */
        .review-card { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            border-radius: 24px; 
            border: 1px solid #334155; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            padding: 40px;
        }

        /* 📸 Immersive Footer */
        .immersive-footer { 
            position: relative; 
            min-height: 80vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            background-color: #0f172a;
        }
        .footer-bg-image { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: center 15%; /* Face visibility focus */
            opacity: 0.45; 
            z-index: 0; 
        }
        .footer-overlay { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(to top, #0f172a 10%, transparent 100%); 
            z-index: 1; 
        }
        .footer-content { position: relative; z-index: 2; width: 100%; }
    </style>
</head>

<body class="pt-24">
    <nav class="fixed top-0 w-full z-50 bg-[#0f172a]/95 backdrop-blur-xl px-6 py-5 flex flex-col md:flex-row justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-4 mb-4 md:mb-0">
            <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-yellow-500 bg-white">
                <img src="images/logo.png" alt="WonderWay" class="w-full h-full object-cover">
            </div>
            <div class="flex flex-col text-left">
                <span class="font-black text-xl tracking-tighter uppercase hero-font text-white leading-none">WonderWay</span>
                <span class="text-[8px] uppercase tracking-[0.4em] text-yellow-500 font-black">Official Collection</span>
            </div>
        </div>
        
        <div class="flex items-center gap-8">
            <div class="hidden lg:flex gap-8 text-[10px] font-black uppercase tracking-widest text-slate-400">
                <a href="#package-grid" class="hover:text-white transition">Experiences</a>
                <a href="#review-submission" class="hover:text-white transition">Stories</a>
            </div>
        </div>
    </nav>

    <header class="pt-24 pb-12 px-6 text-center">
        <h1 class="hero-font text-6xl md:text-8xl font-black uppercase mb-6 tracking-tighter">Kribi <span class="text-yellow-500">Luxury</span></h1>
        <div class="flex flex-wrap justify-center gap-3">
            <button onclick="switchCategory('activities')" id="tab-activities" class="tab-btn active-tab px-8 py-4 rounded-2xl border border-slate-700 font-black text-[11px] uppercase tracking-widest transition-all">Activities</button>
            <button onclick="switchCategory('couples')" id="tab-couples" class="tab-btn px-8 py-4 rounded-2xl border border-slate-700 font-black text-[11px] uppercase tracking-widest transition-all">Couples</button>
            <button onclick="switchCategory('group4')" id="tab-group4" class="tab-btn px-8 py-4 rounded-2xl border border-slate-700 font-black text-[11px] uppercase tracking-widest transition-all">Groups (4)</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="package-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10 mb-32"></div>

        <section id="review-submission" class="mt-40 pt-20 border-t border-slate-800/50">
            <div class="max-w-2xl mx-auto bg-slate-900/80 p-10 md:p-16 rounded-[40px] border border-slate-800 shadow-2xl text-center">
                <h2 class="hero-font text-4xl font-black uppercase mb-8 text-white">Guest <span class="text-yellow-500">Voice</span></h2>
                <form id="reviewForm" class="space-y-6 text-left">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" name="Name" placeholder="Full Name" class="w-full p-5 rounded-2xl" required>
                        <input type="text" name="Location" placeholder="Home City" class="w-full p-5 rounded-2xl" required>
                    </div>
                    <div class="flex flex-col md:flex-row justify-between items-center bg-slate-800/30 p-6 rounded-2xl border border-slate-800">
                        <span class="text-[10px] uppercase font-black text-slate-400">Rate your trip:</span>
                        <div class="star-rating flex flex-row-reverse">
                            <input type="radio" name="Stars" id="star-5" value="5" class="hidden" required><label for="star-5" class="cursor-pointer text-3xl px-1">★</label>
                            <input type="radio" name="Stars" id="star-4" value="4" class="hidden"><label for="star-4" class="cursor-pointer text-3xl px-1">★</label>
                            <input type="radio" name="Stars" id="star-3" value="3" class="hidden"><label for="star-3" class="cursor-pointer text-3xl px-1">★</label>
                            <input type="radio" name="Stars" id="star-2" value="2" class="hidden"><label for="star-2" class="cursor-pointer text-3xl px-1">★</label>
                            <input type="radio" name="Stars" id="star-1" value="1" class="hidden"><label for="star-1" class="cursor-pointer text-3xl px-1">★</label>
                        </div>
                    </div>
                    <textarea name="Review" placeholder="Describe your experience..." rows="5" class="w-full p-6 rounded-3xl" required></textarea>
                    <button type="submit" id="submitBtn" class="w-full py-6 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs tracking-widest hover:bg-white transition-all shadow-lg">Post Live Review</button>
                </form>
            </div>
        </section>

        <section id="feedback" class="mt-40 mb-40">
            <h2 class="hero-font text-5xl font-black uppercase text-center mb-16">Guest <span class="text-slate-500">Stories</span></h2>
            <div id="dynamic-reviews" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>
    </main>

    <footer class="immersive-footer">
        <img src="images/footer.jpg" alt="Founder" class="footer-bg-image">
        <div class="footer-overlay"></div>
        <div class="footer-content text-center px-6">
            <h3 class="hero-font text-4xl md:text-6xl font-black uppercase mb-6 italic text-white">"Luxury is affordable."</h3>
            <div class="flex flex-col md:flex-row gap-8 justify-center items-center pt-12 border-t border-white/10">
                <a href="https://frankfru.com" target="_blank" class="text-white hover:text-yellow-500 uppercase text-[10px] font-black tracking-widest">Portfolio</a>
                <a href="https://github.com/chifru19" target="_blank" class="text-white hover:text-yellow-500 uppercase text-[10px] font-black tracking-widest">GitHub</a>
                <a href="https://linkedin.com/in/frank-fru-454593252/" target="_blank" class="text-white hover:text-yellow-500 uppercase text-[10px] font-black tracking-widest">LinkedIn</a>
            </div>
            <p class="mt-12 text-white/20 text-[10px] uppercase font-black tracking-[0.5em]">© 2026 WonderWay Tours. Engineering by Frank Fru.</p>
        </div>
    </footer>

    <div id="checkout-bar" class="fixed bottom-0 w-full bg-[#0f172a]/95 backdrop-blur-2xl border-t-4 border-yellow-500 p-8 z-[100] transform translate-y-full transition-all duration-500">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-left">
                <p id="cart-count" class="text-yellow-500 font-black text-[10px] uppercase">0 Selected</p>
                <h3 id="cart-total" class="text-3xl font-black hero-font uppercase">Total: 0 CFA</h3>
            </div>
            <button onclick="processWhatsApp()" class="px-16 py-5 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs tracking-widest hover:bg-white transition-all">Confirm via WhatsApp</button>
        </div>
    </div>

    <script>
        /** DATABASE & STATE **/
        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnv5OBvO2JxZ-PSZGaKGaxLl76QS5pv-28btG5l_N5vG_KREbPuE2Wgtw4511LqcQpQYhs9UY1aGp3/pub?output=csv';
        let currentCategory = 'activities'; let cart = [];

        /** 🛠️ LIVE SYNC LOGIC (Col A: Name, B: Location, C: Review, D: Stars) **/
        async function loadReviews() {
            try {
                const response = await fetch(sheetURL + '&cache=' + Date.now());
                const data = await response.text();
                const rows = data.split('\n').filter(r => r.trim() !== "");
                let html = '';

                rows.slice(1).forEach(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 4) {
                        const name = cols[0].replace(/"/g, '').trim();
                        const loc = cols[1].replace(/"/g, '').trim();
                        const review = cols[2].replace(/"/g, '').trim();
                        const starVal = parseInt(cols[3]) || 5;

                        if(name && review) {
                            let sHtml = ''; for(let i=0; i<5; i++) sHtml += i < starVal ? '★' : '☆';
                            html += `
                                <div class="review-card">
                                    <div>
                                        <div class="text-yellow-500 mb-4 text-xl font-black">${sHtml}</div>
                                        <p class="italic text-sm text-slate-300">"${review}"</p>
                                    </div>
                                    <p class="text-white font-black text-[10px] mt-8 uppercase tracking-widest">— ${name}, ${loc}</p>
                                </div>`;
                        }
                    }
                });
                document.getElementById('dynamic-reviews').innerHTML = html || '<p class="text-center col-span-3 opacity-50">No secure records found.</p>';
            } catch (e) { console.error("Sync Error"); }
        }

        const servicesData = {
            activities: [
                { id: "a1", name: "Jet Ski Adventure", price: 10000, img: "images/jetski-action.jpg" },
                { id: "a2", name: "Horse Riding", price: 2000, img: "images/horse-riding.jpg" },
                { id: "a3", name: "Quad Biking", price: 5000, img: "images/Quad.jpg" }
            ],
            couples: [
                { id: "c1", name: "Mini Love Adventure", price: 90000, img: "images/couple paradis escape.jpg" }
            ],
            group4: [
                { id: "g4_1", name: "Crew Chill", price: 230000, img: "images/group-action.jpg" }
            ]
        };

        function renderUI() {
            const grid = document.getElementById('package-grid');
            grid.innerHTML = (servicesData[currentCategory] || []).map(item => {
                const isS = cart.some(c => c.id === item.id);
                return `
                    <div class="package-card p-6">
                        <div class="h-56 rounded-2xl overflow-hidden mb-6"><img src="${item.img}" class="w-full h-full object-cover"></div>
                        <h4 class="text-xl font-black hero-font uppercase mb-1">${item.name}</h4>
                        <p class="text-yellow-500 font-bold mb-6">${new Intl.NumberFormat('fr-CM').format(item.price)} CFA</p>
                        <button onclick="toggleService('${item.id}', '${item.name}', ${item.price})" class="w-full py-4 ${isS ? 'bg-yellow-500 text-black' : 'bg-white text-black'} font-black rounded-xl uppercase text-[10px]">
                            ${isS ? 'Added ✓' : 'Add to Trip'}
                        </button>
                    </div>`;
            }).join('');
        }

        function toggleService(id, name, price) {
            const idx = cart.findIndex(i => i.id === id);
            idx > -1 ? cart.splice(idx, 1) : cart.push({ id, name, price });
            updateCart(); renderUI();
        }

        function updateCart() {
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = `Total: ${new Intl.NumberFormat('fr-CM').format(total)} CFA`;
            document.getElementById('cart-count').innerText = `${cart.length} Selected`;
            document.getElementById('checkout-bar').classList.toggle('translate-y-full', cart.length === 0);
        }

        function switchCategory(cat) { 
            currentCategory = cat; 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab')); 
            document.getElementById('tab-' + cat).classList.add('active-tab'); renderUI(); 
        }

        function processWhatsApp() {
            let msg = "WonderWay Booking:\n";
            cart.forEach((i, idx) => msg += `${idx+1}. ${i.name}\n`);
            msg += `\nTotal: ${document.getElementById('cart-total').innerText}`;
            window.open("https://wa.me/237653827999?text=" + encodeURIComponent(msg));
        }

        document.getElementById('reviewForm').addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true;
            fetch('https://script.google.com/macros/s/AKfycbwpQ9FZiLRbL695i1Eni-r69KSyCONRsdygRrqKDybZOZCkEXbKd_2S1RRZGaYU7vrC/exec', { method: 'POST', body: new FormData(e.target)})
                .then(() => { alert("Story Published!"); e.target.reset(); btn.disabled = false; loadReviews(); });
        });

        window.onload = () => { loadReviews(); renderUI(); };
    </script>
</body>
</html>
