<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderWay | Kribi Collection</title>
    
    <meta name="description" content="Premium Kribi travel experiences. Curated tours, jet skiing, and luxury escapes in Cameroon.">
    <meta property="og:title" content="WonderWay | The Kribi Collection">
    <meta property="og:description" content="Book your authentic Cameroon adventure.">
    <meta property="og:url" content="https://wonderwaytourcameroon.com">
    <meta property="og:type" content="website">
    <link rel="icon" href="images/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Outfit:wght@200;400;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: white; 
            scroll-behavior: smooth; 
        }
        
        .hero-font { font-family: 'Outfit', sans-serif; }
        
        .active-tab { 
            background: #fbbf24 !important; 
            color: black !important; 
            border-color: #fbbf24 !important; 
        }
        
        .package-card { 
            transition: all 0.3s ease; 
            border: 1px solid #1e293b; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            border-radius: 24px; 
            overflow: hidden; 
            background: #1e293b60; 
        }
        
        .package-card:hover { 
            transform: translateY(-5px); 
            border-color: #fbbf24; 
            box-shadow: 0 10px 30px -15px rgba(251, 191, 36, 0.3); 
        }
        
        .selected-card { 
            border-color: #fbbf24 !important; 
            background: #fbbf2415 !important; 
        }
        
        select { 
            background-image: none; 
            -webkit-appearance: none; 
            -moz-appearance: none; 
            appearance: none; 
        }

        .review-card {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="pt-24">
    <nav class="fixed top-0 w-full z-50 bg-[#0f172a]/90 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-yellow-500 bg-white flex items-center justify-center">
                <img src="images/logo.png" alt="WonderWay Logo" class="w-full h-full object-cover">
            </div>
            <span class="font-bold text-lg tracking-tighter uppercase hero-font border-l-4 border-yellow-500 pl-3 text-white">WonderWay</span>
        </div>
        
        <div class="flex items-center gap-4">
            <select id="currency-select" onchange="updateCurrency()" class="bg-slate-800 border border-slate-700 text-white text-[10px] font-bold uppercase tracking-widest rounded-lg px-3 py-2 outline-none cursor-pointer hover:border-yellow-500 transition-colors">
                <option value="XAF">CFA Franc</option>
                <option value="EUR">Euro (€)</option>
                <option value="USD">Dollar ($)</option>
            </select>
            
            <div class="flex items-center gap-6 border-l border-slate-800 pl-6">
                <a href="https://www.tiktok.com/@wonderway_tour_cameroon" target="_blank" class="hover:text-yellow-500 transition-colors text-xl"><i class="fab fa-tiktok"></i></a>
                <a href="https://www.instagram.com/wanderway_tour_cameroon" target="_blank" class="hover:text-yellow-500 transition-colors text-xl"><i class="fab fa-instagram"></i></a>
                <a href="https://www.facebook.com/share/1BF6J9sik8/" target="_blank" class="hover:text-yellow-500 transition-colors text-xl"><i class="fab fa-facebook"></i></a>
            </div>
        </div>
    </nav>

    <header class="pt-20 pb-12 px-6 text-center">
        <h1 class="hero-font text-5xl md:text-7xl font-black uppercase mb-4 tracking-tighter">The Kribi <span class="text-yellow-500">Collection</span></h1>
        <p class="max-w-2xl mx-auto text-slate-400 text-sm mb-10 italic">"Luxury experiences curated for the bold traveler."</p>
        
        <div class="flex flex-wrap justify-center gap-2">
            <button onclick="switchCategory('activities')" id="tab-activities" class="tab-btn active-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition">Activities</button>
            <button onclick="switchCategory('couples')" id="tab-couples" class="tab-btn px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition">Couples</button>
            <button onclick="switchCategory('group4')" id="tab-group4" class="tab-btn px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition">Group of 4</button>
            <button onclick="switchCategory('group6')" id="tab-group6" class="tab-btn px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition">Group of 6</button>
            <button onclick="switchCategory('events')" id="tab-events" class="tab-btn px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition">Event Escape</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 mb-24">
        <div id="package-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        
        <section id="feedback" class="mt-32 border-t border-slate-800 pt-20">
            <div class="text-center mb-12">
                <h2 class="hero-font text-4xl font-black uppercase tracking-tighter">Guest <span class="text-yellow-500">Stories</span></h2>
                <p class="text-slate-400 text-xs uppercase mt-2 italic tracking-widest">Verified experiences from our Kribi community</p>
            </div>
            
            <div id="dynamic-reviews" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto mb-16">
                <p class="text-center text-slate-500 col-span-full py-10">Synchronizing database entries...</p>
            </div>
        </section>
    </main>

    <div id="checkout-bar" class="fixed bottom-0 w-full bg-[#0f172a] border-t-2 border-yellow-500 p-6 z-[60] transform translate-y-full transition-all duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-left">
                <p id="cart-count" class="text-yellow-500 font-black text-[10px] uppercase tracking-widest">0 Selected</p>
                <h3 id="cart-total" class="text-2xl font-black hero-font uppercase">Total: 0 CFA</h3>
            </div>
            <button onclick="processPayment()" class="px-12 py-4 bg-yellow-500 text-black font-black rounded-full uppercase text-xs tracking-widest hover:bg-white transition-all shadow-2xl">Book & Pay via WhatsApp</button>
        </div>
    </div>

    <footer class="bg-slate-900 py-20 px-6 border-t border-white/10 text-center">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-center gap-6 mb-8">
                <a href="https://frankfru.com" target="_blank" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-white transition">Portfolio</a>
                <a href="https://github.com/chifru19" target="_blank" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-white transition">GitHub</a>
                <a href="https://www.linkedin.com/in/frank-fru-454593252/" target="_blank" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-white transition">LinkedIn</a>
            </div>
            <p class="text-white/20 text-[9px] uppercase tracking-widest font-bold">© 2026 WonderWay Tours. Engineered by Frank Fru.</p>
        </div>
    </footer>

    <script>
        let currentCurrency = 'XAF';
        let currentCategory = 'activities';
        let cart = [];
        const rates = { XAF: 1, EUR: 0.0015, USD: 0.0016 };

        async function loadReviews() {
            const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTnv5OBvO2JxZ-PSZGaKGaxLl76QS5pv-28btG5l_N5vG_KREbPuE2Wgtw4511LqcQpQYhs9UY1aGp3/pub?output=csv"; 
            try {
                const response = await fetch(sheetURL);
                const csvData = await response.text();
                const lines = csvData.split('\n').slice(1); 
                const container = document.getElementById('dynamic-reviews');
                
                if (!container) return; // Guard clause
                
                container.innerHTML = lines.map(line => {
                    const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const name = parts[0]?.replace(/"/g, '').trim();
                    const loc = parts[1]?.replace(/"/g, '').trim();
                    const review = parts[2]?.replace(/"/g, '').trim();
                    if(!name || !review) return '';
                    return `<div class="review-card bg-slate-900 p-8 rounded-2xl border border-slate-800 italic text-slate-300">"${review}"<p class="mt-4 text-yellow-500 font-bold not-italic text-xs uppercase tracking-tighter">— ${name}, ${loc}</p></div>`;
                }).join('');
            } catch (e) { 
                console.error("Sync Failure", e); 
            }
        }

        const categories = {
            activities: [
                { id: "a1", tier: "Single", name: "Jet Ski Adventure", price: 10000, img: "images/jetski-action.jpg", features: ["15 Mins High-Speed Experience", "Safety Professional Instructor", "High-Quality Life Jacket Included", "Full Fuel Service Included"] },
                { id: "a2", tier: "Single", name: "Horse Riding", price: 2000, img: "images/horse-riding.jpg", features: ["Scenic Sunset Beach Ride", "Expert Guided Nature Tour", "Unlimited Photo Sessions", "Friendly Trained Horses"] },
                { id: "a3", tier: "Single", name: "Quad Biking", price: 5000, img: "images/Quad.jpg", features: ["Thrilling Beach Trail Ride", "Professional All-Terrain Gear", "Mandatory Basic Training", "Safety Certified Helmet"] },
                { id: "a4", tier: "Single", name: "Sip & Paint", price: 15000, img: "images/sip-paint.jpg", features: ["2-Hour Creative Session", "One Complimentary Premium Drink", "Full Art Supplies Provided", "Professional Guided Painting"] },
                { id: "a5", tier: "Single", name: "Museum Visit", price: 2000, img: "images/museum.jpg", features: ["Deep Cultural Heritage Tour", "Bilingual English/French Guide", "All Site Entry Fees Covered", "Historical Context Briefing"] }
            ],
            couples: [
                { id: "c1", tier: "Silver", name: "Mini Love Adventure", price: 90000, img: "images/couple paradis escape.jpg", features: ["2 Days Luxury Villa Lodging", "Jet ski & Quad Activity Bundle", "Museum & Waterfall Guided Tour", "Professional Content Creation"] },
                { id: "c2", tier: "Gold", name: "Paradise Escape", price: 250000, img: "images/sip-paint.jpg", features: ["Includes All Silver Items", "Romantic Private Beach Dinner", "Evening Private Beach Fire", "Premium Champagne Service"] },
                { id: "c3", tier: "Premium", name: "Royal Romance", price: 350000, img: "images/royal romance.jpg", features: ["Includes All Gold Items", "Exclusive Private Boat Cruise", "Industrial Seaport Guided Visit", "24/7 Concierge Support"] }
            ],
            group4: [
                { id: "g4_1", tier: "Silver", name: "Crew Chill", price: 230000, img: "images/group-action.jpg", features: ["Group Villa Luxury Lodging", "Water Sports Activity Bundle", "Scenic Waterfall Photo Tour", "Beach Volleyball Setup"] },
                { id: "g4_2", tier: "Gold", name: "Vibes & Memories", price: 350000, img: "images/dinner-setup.jpg", features: ["Includes All Silver Items", "Full Group Beach BBQ Dinner", "Private Sip & Paint Session", "Custom Music Experience"] }
            ],
            group6: [
                { id: "g6_1", tier: "Silver", name: "Friends & Waves", price: 270000, img: "images/group-action.jpg", features: ["Executive Beachfront Villa", "Full Water Sports Activity Pack", "Bilingual Group Guide", "Morning Wellness Session"] }
            ],
            events: [
                { id: "ev1", tier: "Custom", name: "Beachside Wedding", price: 0, img: "images/group-action.jpg", features: ["Full Themed Floral Decoration", "Custom Wedding Cake & Music", "Premium Catering Service", "Private Event Security"] },
                { id: "ev2", tier: "Corporate", name: "Company Retreat", price: 0, img: "images/group-boat.jpg", features: ["Team Building Exercises", "Dedicated Workshop Space", "Executive Group Catering", "Audio/Visual Equipment Setup"] }
            ]
        };

        function formatPrice(val) {
            if (val === 0) return "Inquire";
            const converted = val * rates[currentCurrency];
            return currentCurrency === 'XAF' ? new Intl.NumberFormat('fr-CM').format(val) + ' CFA' : (currentCurrency === 'EUR' ? '€' : '$') + converted.toFixed(2);
        }

        function toggleCart(id, name, price) {
            const idx = cart.findIndex(i => i.id === id);
            if (idx > -1) cart.splice(idx, 1);
            else cart.push({ id, name, price: Number(price) });
            updateCartUI();
            switchCategory(currentCategory);
        }

        function updateCartUI() {
            const bar = document.getElementById('checkout-bar');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = `Total: ${formatPrice(total)}`;
            document.getElementById('cart-count').innerText = `${cart.length} Selected`;
            if (cart.length > 0) bar.classList.remove('translate-y-full');
            else bar.classList.add('translate-y-full');
        }

        function updateCurrency() {
            currentCurrency = document.getElementById('currency-select').value;
            switchCategory(currentCategory);
            updateCartUI();
        }

        function processPayment() {
            const items = cart.map(i => `• ${i.name}`).join('%0A');
            const totalStr = document.getElementById('cart-total').innerText;
            window.open(`https://wa.me/237653827999?text=Booking Request:%0A${items}%0A%0A${totalStr}`, '_blank');
        }

        function switchCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('tab-' + cat)?.classList.add('active-tab');
            const grid = document.getElementById('package-grid');
            grid.innerHTML = (categories[cat] || []).map(item => {
                const sel = cart.some(c => c.id === item.id);
                return `
                <div class="package-card ${sel ? 'selected-card' : ''}">
                    <div class="relative h-48 overflow-hidden"><img src="${item.img}" class="w-full h-full object-cover"></div>
                    <div class="p-8 flex flex-col flex-grow">
                        <span class="text-yellow-500 font-black text-[10px] uppercase tracking-widest">${item.tier}</span>
                        <h4 class="text-2xl font-black mb-1 hero-font">${item.name}</h4>
                        <p class="text-xl font-bold mb-6 text-slate-300">${formatPrice(item.price)}</p>
                        <ul class="space-y-3 mb-8 flex-grow">
                            ${item.features.map(f => `<li class="text-xs text-slate-400 flex items-center gap-2"><i class="fas fa-check text-yellow-500"></i> ${f}</li>`).join('')}
                        </ul>
                        <button onclick="toggleCart('${item.id}', '${item.name}', ${item.price})" class="w-full py-4 ${sel ? 'bg-yellow-500 text-black' : 'bg-white text-black'} font-black rounded-xl uppercase text-[10px]">${sel ? 'Selected ✓' : 'Add to Trip'}</button>
                    </div>
                </div>`;
            }).join('');
        }

        window.onload = () => { loadReviews(); switchCategory('activities'); };
    </script>
</body>
</html>
