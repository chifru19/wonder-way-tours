<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonder Way | Authentic Kribi Coastal Tours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Outfit:wght@200;400;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .package-card { transition: all 0.3s ease; border-radius: 30px; background: white; border: 1px solid #e2e8f0; position: relative; overflow: hidden; }
        .package-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .active-tab { background: #fbbf24 !important; color: black !important; border-color: #fbbf24 !important; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white border-b border-slate-800">
        <div class="flex items-center gap-3">
            <img src="images/logo.jpg" class="w-10 h-10 rounded-full border border-yellow-500 object-cover" alt="Small Logo">
            <span class="font-bold text-xl tracking-tighter uppercase hero-font border-l-4 border-yellow-500 pl-3">Wonder Way</span>
        </div>
        <div class="flex bg-slate-800 rounded-lg p-1">
            <button onclick="setCurrency('CFA', 1)" id="curr-CFA" class="px-4 py-1 rounded-md text-xs font-bold bg-white text-slate-900 shadow-sm transition-all">CFA</button>
            <button onclick="setCurrency('USD', 0.0016)" id="curr-USD" class="px-4 py-1 rounded-md text-xs font-bold transition-all text-white">USD</button>
        </div>
    </nav>

    <header class="relative pt-40 pb-20 px-6 text-center bg-[#0f172a] text-white">
        <div class="max-w-4xl mx-auto">
            
            <div class="mb-10 inline-block p-1 bg-black rounded-[30px] border-2 border-slate-700 shadow-2xl">
                <img src="images/logo.jpg" class="w-64 md:w-80 h-auto rounded-2xl" alt="Wonder Way Official Logo">
            </div>

            <h1 class="hero-font text-5xl md:text-8xl font-black uppercase mb-6 leading-none tracking-tighter">
                The Kribi <span class="text-yellow-500">Collection</span>
            </h1>
            <p class="text-slate-400 italic text-sm md:text-base mb-12 max-w-xl mx-auto leading-relaxed">
                "Experience the coast like a local. To keep luxury affordable, private transport is not included in our curated packages."
            </p>
            
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="showGroup('couple')" id="tab-couple" class="group-tab active-tab px-10 py-4 rounded-xl border border-slate-700 font-bold text-xs uppercase tracking-widest transition">Couples</button>
                <button onclick="showGroup('group4')" id="tab-group4" class="group-tab px-10 py-4 rounded-xl border border-slate-700 font-bold text-xs uppercase tracking-widest transition text-white">Group of 4</button>
                <button onclick="showGroup('group6')" id="tab-group6" class="group-tab px-10 py-4 rounded-xl border border-slate-700 font-bold text-xs uppercase tracking-widest transition text-white">Group of 6</button>
            </div>
        </div>
    </header>

    <section class="py-20 bg-white">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="hero-font text-3xl md:text-5xl font-black uppercase mb-12 text-slate-900">The Kribi <span class="text-yellow-500">Vibe</span></h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <img src="images/jetski-action.jpg" class="w-full h-64 object-cover rounded-3xl shadow-sm">
                <img src="images/group-boat.jpg" class="w-full h-64 object-cover rounded-3xl shadow-sm">
                <img src="images/dinner-setup.jpg" class="w-full h-64 object-cover rounded-3xl shadow-sm">
                <img src="images/beach-portrait.jpg" class="w-full h-64 object-cover rounded-3xl shadow-sm">
                <img src="images/jet-ski-fun.jpg" class="w-full h-64 object-cover rounded-3xl shadow-sm">
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-32">
        <div id="package-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
    </main>

    <script>
        const store = {
            couple: [
                { name: "Mini Love", tier: "Silver", price: 90000, img: "images/jetski-action.jpg", items: ["2 Days Lodging", "Jet ski", "Quad", "Museum visit", "Lobe Falls", "Pygmies Visit", "2 Beaches", "Mini Boat", "Mobile Pictures"] },
                { name: "Paradise Escape", tier: "Gold", price: 250000, img: "images/dinner-setup.jpg", items: ["Everything in Silver", "Sip & Paints", "Romantic Dinner", "Camp fire"] },
                { name: "Royal Romance", tier: "Premium", price: 350000, img: "images/group-boat.jpg", items: ["Everything in Gold", "Boat Cruise w/ Wine", "Seaport visit", "Beach Games"] }
            ],
            group4: [
                { name: "Crew Chill", tier: "Silver", price: 230000, img: "images/jetski-action.jpg", items: ["2 Days Lodging", "Jet ski", "Quad", "Museum visit", "Lobe Falls", "Pygmies Visit", "2 Beaches", "Mini Boat", "Mobile Pictures"] },
                { name: "Vibes & Memories", tier: "Gold", price: 350000, img: "images/dinner-setup.jpg", items: ["Everything in Silver", "Sip & Paints", "Group Dinner", "Camp fire"] },
                { name: "VIP Getaway", tier: "Premium", price: 420000, img: "images/group-boat.jpg", items: ["Everything in Gold", "Boat Cruise w/ Wine", "Seaport visit", "Beach Games"] }
            ],
            group6: [
                { name: "Waves Escape", tier: "Silver", price: 270000, img: "images/jetski-action.jpg", items: ["2 Days Lodging", "Jet ski", "Quad", "Museum visit", "Lobe Falls", "Pygmies Visit", "2 Beaches", "Mini Boat", "Mobile Pictures"] },
                { name: "Golden Crew", tier: "Gold", price: 440000, img: "images/dinner-setup.jpg", items: ["Everything in Silver", "Sip & Paints", "Group Dinner", "Camp fire"] },
                { name: "Paradise Circle", tier: "Premium", price: 530000, img: "images/group-boat.jpg", items: ["Everything in Gold", "Boat Cruise w/ Wine", "Seaport visit", "Beach Games"] }
            ]
        };

        let currentRate = 1;
        let activeGroup = 'couple';

        function render() {
            const grid = document.getElementById('package-grid');
            grid.innerHTML = store[activeGroup].map(pkg => `
                <div class="package-card p-8 flex flex-col">
                    <img src="${pkg.img}" class="w-full h-56 object-cover rounded-2xl mb-6 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">${pkg.tier}</span>
                    <h3 class="hero-font text-2xl font-black mb-2">${pkg.name}</h3>
                    <div class="text-4xl font-black mb-8 text-slate-900">
                        ${(pkg.price * currentRate).toLocaleString()} 
                        <span class="text-sm font-bold uppercase text-slate-400">${currentRate === 1 ? 'CFA' : 'USD'}</span>
                    </div>
                    <ul class="space-y-4 mb-10 flex-grow">
                        ${pkg.items.map(item => `
                            <li class="text-[12px] font-semibold flex items-center gap-3 text-slate-600">
                                <i class="fas fa-check-circle text-yellow-500"></i> ${item}
                            </li>
                        `).join('')}
                    </ul>
                    <button class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-yellow-500 hover:text-black transition-all">Book This Trip</button>
                </div>
            `).join('');
        }

        function showGroup(g) {
            activeGroup = g;
            document.querySelectorAll('.group-tab').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('tab-'+g).classList.add('active-tab');
            render();
        }

        function setCurrency(label, rate) {
            currentRate = rate;
            document.getElementById('curr-CFA').className = label === 'CFA' ? 'px-4 py-1 rounded-md text-xs font-bold bg-white text-slate-900 shadow-sm' : 'px-4 py-1 rounded-md text-xs font-bold text-white';
            document.getElementById('curr-USD').className = label === 'USD' ? 'px-4 py-1 rounded-md text-xs font-bold bg-white text-slate-900 shadow-sm' : 'px-4 py-1 rounded-md text-xs font-bold text-white';
            render();
        }

        render();
    </script>
</body>
</html>
