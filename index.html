<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Reviews | frankfru.com</title>
    <style>
        /* Professional Design System */
        :root {
            --primary-blue: #2563eb;
            --dark-gray: #111827;
            --soft-gray: #6b7280;
            --bg-color: #ffffff;
            --card-border: #e5e7eb;
            --star-gold: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-gray);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Main Content wrapper */
        .main-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 24px;
            flex: 1;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--dark-gray);
            letter-spacing: -0.025em;
        }

        /* Review Container and Cards */
        #dynamic-reviews {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .review-card {
            background: #fff;
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        .review-card:hover {
            transform: translateY(-2px);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .review-author {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--dark-gray);
        }

        .review-rating {
            color: var(--star-gold);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .review-text {
            color: var(--soft-gray);
            font-size: 1.1rem;
            font-style: italic;
        }

        /* Footer Branding - Engineered by frank fru */
        footer {
            background-color: #fafafa;
            border-top: 1px solid var(--card-border);
            padding: 60px 24px;
            text-align: center;
            margin-top: 60px;
        }

        .engineered-text {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--dark-gray);
            display: block;
            margin-bottom: 15px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .footer-links a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .loading-state {
            text-align: center;
            padding: 50px;
            color: var(--soft-gray);
            font-style: italic;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .review-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header>
            <h1>Client Reviews</h1>
        </header>

        <div id="dynamic-reviews">
            <div class="loading-state">Syncing with database...</div>
        </div>
    </div>

    <footer>
        <span class="engineered-text">Engineered by frank fru</span>
        <div class="footer-links">
            <a href="https://frankfru.com" target="_blank">Website</a>
            <a href="https://frankfru.com" target="_blank">Portfolio</a>
        </div>
        <p style="margin-top: 25px; font-size: 0.85rem; color: #9ca3af;">&copy; 2026 Frank Fru</p>
    </footer>

    <script>
        /**
         * Asynchronous function to fetch data from the server-side
         */
        window.onload = function() {
            google.script.run
                .withSuccessHandler(function(html) {
                    const container = document.getElementById('dynamic-reviews');
                    if (html && html.trim() !== "") {
                        container.innerHTML = html;
                    } else {
                        container.innerHTML = "<p style='text-align:center;'>No reviews found.</p>";
                    }
                })
                .withFailureHandler(function() {
                    document.getElementById('dynamic-reviews').innerHTML = 
                        "<p style='text-align:center; color:red;'>Error connecting to the review database.</p>";
                })
                .loadReviews();
        };
    </script>
</body>
</html>
