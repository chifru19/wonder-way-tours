<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderWay | Kribi Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Outfit:wght@200;400;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .active-tab { background: #fbbf24 !important; color: black !important; border-color: #fbbf24 !important; }
        .package-card { transition: all 0.3s ease; border: 1px solid #1e293b; height: 100%; }
        .package-card:hover { transform: translateY(-5px); border-color: #fbbf24; }
    </style>
</head>
<body class="pt-24">

    <nav class="fixed top-0 w-full z-50 bg-[#0f172a]/90 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-yellow-500 bg-white flex items-center justify-center">
                <img src="images/logo.png" alt="WonderWay" class="w-full h-full object-cover">
            </div>
            <span class="font-bold text-lg tracking-tighter uppercase hero-font border-l-4 border-yellow-500 pl-3 text-white">WonderWay</span>
        </div>
        
        <div class="flex items-center gap-6">
            <a href="https://www.tiktok.com/@wonderway_tour_cameroon?_r=1&_t=ZS-95NXgDdlpzh" target="_blank" class="hover:text-yellow-500 transition-colors"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.instagram.com/wanderway_tour_cameroon?igsh=MTBibGNhaWJrZnd2Yg%3D%3D&utm_source=qr" target="_blank" class="hover:text-yellow-500 transition-colors"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/share/1BF6J9sik8/?mibextid=wwXIfr" target="_blank" class="hover:text-yellow-500 transition-colors"><i class="fab fa-facebook"></i></a>
        </div>
    </nav>

    <header class="pt-20 pb-12 px-6 text-center">
        <h1 class="hero-font text-5xl md:text-7xl font-black uppercase mb-4 tracking-tighter">The Kribi <span class="text-yellow-500">Collection</span></h1>
        <p class="max-w-2xl mx-auto text-slate-400 text-sm mb-10 italic">"Experience the coast like a local. To keep luxury affordable, private transport is not included in our curated packages."</p>
        
        <div class="flex flex-wrap justify-center gap-2">
            <button onclick="switchCategory('activities')" id="tab-activities" class="tab-btn active-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition">Activities</button>
            <button onclick="switchCategory('couples')" id="tab-couples" class="tab-btn px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition">Couples</button>
            <button onclick="switchCategory('group4')" id="tab-group4" class="tab-btn px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition">Group of 4</button>
            <button onclick="switchCategory('group6')" id="tab-group6" class="tab-btn px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition">Group of 6</button>
            <button onclick="switchCategory('escapes')" id="tab-escapes" class="tab-btn px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition">Event Escapes</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="package-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </main>

    <footer class="bg-black py-20 px-6 text-center border-t border-slate-900">
        <h3 class="hero-font text-2xl font-black uppercase mb-4">Wander with Us</h3>
        <a href="https://linktr.ee/wonderwaytourkribi" target="_blank" class="inline-block px-8 py-4 bg-yellow-500 text-black font-black rounded-full uppercase text-xs tracking-widest mb-10 hover:bg-yellow-400 transition-all">Explore our Linktree</a>
        <p class="text-slate-600 text-[10px] uppercase tracking-widest">&copy; 2026 WonderWay Tours. Engineered by Frank Fru.</p>
    </footer>

    <script>
        const categories = {
            activities: [
                { tier: "Single", name: "Quad Biking", price: "5,000 CFA", img: "images/Quad.jpg", features: ["Beach Ride", "Safety Gear"] },
                { tier: "Single", name: "Museum Visit", price: "2,000 CFA", img: "images/museum.jpg", features: ["History Tour", "Guided"] },
                { tier: "Single", name: "Sip & Paint", price: "15,000 CFA", img: "images/sip and paint.jpg", features: ["Creative Meal", "All Materials"] },
                { tier: "Single", name: "Seaport Visit", price: "2,000 CFA", img: "images/seaport visit.jpg", features: ["Deep Sea Port Tour"] },
                { tier: "Single", name: "Pygmies Visit", price: "10,000 CFA", img: "images/pigmi village.jpg", features: ["Cultural Entry"] },
                { tier: "Single", name: "Canoe Tour", price: "3,000 CFA", img: "images/canoe.jpg", features: ["River Exploration"] },
                { tier: "Single", name: "Oceanfront Dinner", price: "25,000 CFA", img: "images/dinner.jpg", features: ["Private Table"] }
            ],
            couples: [
                { tier: "Silver", name: "Mini Love", price: "90,000 CFA", img: "images/couple paradis escape.jpg", features: ["2 Days Lodging", "Jet ski", "Quad", "Museum visit", "Lobe Falls", "Pygmies Visit", "2 Beaches", "Mini Boat", "Mobile Pictures"] },
                { tier: "Gold", name: "Paradise Escape", price: "250,000 CFA", img: "images/sip and paint.jpg", features: ["Everything in Silver", "Sip & Paint", "Romantic Dinner", "Camp fire"] },
                { tier: "Premium", name: "Royal Romance", price: "350,000 CFA", img: "images/royal romance.jpg", features: ["Everything in Gold", "Boat Cruise w/ Wine", "Seaport visit", "Beach Games"] }
            ]
        };

        function switchCategory(cat) {
            // Update Tab Styling
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            const tab = document.getElementById('tab-' + cat);
            if(tab) tab.classList.add('active-tab');

            // Render Grid Content
            const grid = document.getElementById('package-grid');
            const data = categories[cat] || [];
            
            grid.innerHTML = data.map(item => `
                <div class="package-card bg-slate-900 rounded-3xl overflow-hidden flex flex-col">
                    <img src="${item.img}" class="w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Not+Found'">
                    <div class="p-8 flex flex-col flex-grow">
                        <span class="text-yellow-500 font-black text-[10px] uppercase tracking-widest mb-1">${item.tier}</span>
                        <h4 class="text-2xl font-black mb-1 uppercase hero-font">${item.name}</h4>
                        <p class="text-xl font-bold mb-6 text-slate-300">${item.price}</p>
                        <ul class="space-y-3 mb-8 flex-grow">
                            ${item.features.map(f => `<li class="text-xs text-slate-400 flex items-center gap-2"><i class="fas fa-check text-yellow-500"></i> ${f}</li>`).join('')}
                        </ul>
                        <button class="w-full py-4 bg-white text-black font-black rounded-xl uppercase text-[10px] tracking-widest hover:bg-yellow-400 transition">Book This Trip</button>
                    </div>
                </div>
            `).join('');
        }

        // Initialize with Activities
        switchCategory('activities');
    </script>
</body>
</html>
