<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderWay | Kribi Collection</title>    
    <link rel="icon" href="https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Outfit:wght@200;400;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; scroll-behavior: smooth; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .active-tab { background: #fbbf24 !important; color: black !important; border-color: #fbbf24 !important; }
        
        .package-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #1e293b; 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px);
            border-radius: 32px;
            overflow: hidden;
            height: 100%;
        }
        
        .package-card:hover { transform: translateY(-12px); border-color: #fbbf24; box-shadow: 0 25px 50px -12px rgba(251, 191, 36, 0.3); }
        
        #booking-engine { display: none; opacity: 0; transform: translateY(20px); transition: all 0.6s ease; }
        .folder-visible { display: block !important; opacity: 1 !important; transform: translateY(0) !important; }

        #inquiry-modal { display: none; }
        .modal-open { overflow: hidden; }

        .review-card { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            border-radius: 32px; 
            border: 1px solid #334155; 
            padding: 40px; 
            transition: 0.3s;
            text-align: left;
        }
        .review-card:hover { border-color: #fbbf24; }

        .immersive-footer { 
            position: relative; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            background-color: #0f172a;
        }
        
        .footer-bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 15%;
            opacity: 0.7;
        }
        
        .footer-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #0f172a 20%, rgba(15, 23, 42, 0.4) 60%, transparent 100%);
        }
        
        #checkout-bar { transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 -20px 40px rgba(0,0,0,0.4); }

        .story-cta {
            background: #fbbf24;
            color: #0f172a;
            padding: 14px 30px;
            border-radius: 14px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 50px;
        }
    </style>
</head>

<body class="pt-24">
    <nav class="fixed top-0 w-full z-50 bg-[#0f172a]/95 backdrop-blur-xl px-6 py-5 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-yellow-500 bg-white">
                <img src="https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/logo.png" alt="WonderWay" class="w-full h-full object-cover">
            </div>
            <div class="flex flex-col text-left">
                <span class="font-black text-xl hero-font text-white uppercase leading-none">WonderWay</span>
                <span class="text-[8px] uppercase tracking-widest text-yellow-500 font-black">Official Collection</span>
            </div>
        </div>

        <div class="bg-slate-800/80 px-4 py-2 rounded-2xl border border-slate-700">
            <select id="currency-select" onchange="updateCurrency()" class="bg-transparent text-white text-[10px] font-bold uppercase outline-none cursor-pointer">
                <option value="XAF">CFA (XAF)</option>
                <option value="EUR">Euro (€)</option>
                <option value="USD">Dollar ($)</option>
            </select>
        </div>
    </nav>

    <header class="pt-24 pb-12 px-6 text-center">
        <h1 class="hero-font text-6xl md:text-8xl font-black uppercase mb-6 tracking-tighter leading-none">Kribi <span class="text-yellow-500">Luxury</span></h1>
        <p class="max-w-2xl mx-auto mb-16 text-[10px] uppercase tracking-[0.2em] font-bold text-white/50 leading-relaxed italic">
            "We don’t include transportation in our packages because most clients prefer the flexibility of private means."
        </p>

        <div class="flex flex-wrap justify-center gap-3">
            <button onclick="switchCategory('activities')" id="tab-activities" class="tab-btn active-tab px-6 py-4 rounded-2xl border border-slate-700 font-black text-[10px] uppercase tracking-widest">Activities</button>
            <button onclick="switchCategory('couples')" id="tab-couples" class="tab-btn px-6 py-4 rounded-2xl border border-slate-700 font-black text-[10px] uppercase tracking-widest">Couples</button>
            <button onclick="switchCategory('group4')" id="tab-group4" class="tab-btn px-6 py-4 rounded-2xl border border-slate-700 font-black text-[10px] uppercase tracking-widest">Groups (4)</button>
            <button onclick="switchCategory('group6')" id="tab-group6" class="tab-btn px-6 py-4 rounded-2xl border border-slate-700 font-black text-[10px] uppercase tracking-widest">Groups (6)</button>
            <button onclick="switchCategory('concierge')" id="tab-concierge" class="tab-btn px-6 py-4 rounded-2xl border border-slate-700 font-black text-[10px] uppercase tracking-widest">Concierge</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 mb-40">
        <div id="package-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-20"></div>

        <section id="feedback" class="mt-40 text-center">
            <h2 class="hero-font text-5xl font-black uppercase mb-16 underline decoration-yellow-500 underline-offset-8">Guest Stories</h2>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSc7z893p7R3G8a-jG8X-M1C-uU/viewform" target="_blank" class="story-cta">Share Your Story</a>
            <div id="dynamic-reviews" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>
    </main>

    <div id="checkout-bar" class="fixed bottom-0 w-full bg-[#0f172a]/95 backdrop-blur-2xl border-t-4 border-yellow-500 p-8 z-[100] transform translate-y-full">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-left">
                <p id="cart-count" class="text-yellow-500 font-black text-[10px] uppercase mb-1">0 Selected</p>
                <h3 id="cart-total" class="text-3xl font-black hero-font uppercase">Total: 0 CFA</h3>
            </div>
            <button onclick="processWhatsApp()" class="px-16 py-5 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs tracking-widest hover:bg-white transition-all shadow-xl">Confirm via WhatsApp</button>
        </div>
    </div>

    <script>
        let currentCurrency = 'XAF'; 
        let currentCategory = 'activities'; 
        let cart = [];
        const rates = { XAF: 1, EUR: 0.0015, USD: 0.0016 };

        const servicesData = {
            activities: [
                { id: "a1", name: "Jet Ski", price: 10000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/jetski-action.jpg" },
                { id: "a2", name: "Horse Riding", price: 2000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/horse-riding.jpg" },
                { id: "a3", name: "Quad Biking", price: 5000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/Quad.jpg" },
                { id: "a4", name: "Zorb Ball Action", price: 15000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/Zorb%20Ball.jpg" }, 
                { id: "a5", name: "Night Bonfire & Grill", price: 15000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/campfire.jpg" }, 
                { id: "a6", name: "Sip & Paint", price: 15000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/sip-paint.jpg" },
                { id: "a7", name: "Grand Batanga Museum", price: 3000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/museum.jpg" },
                { id: "a8", name: "Kribi Seaport Visit", price: 10000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/seaport%20visit.jpg" },
                { id: "a9", name: "Canoe Trip", price: 3000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/canoe.jpg" },
                { id: "a10", name: "Baka Pygmy Village", price: 10000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/pigmi%20village.jpg" }
            ],
            couples: [
                { id: "c1", name: "Mini Love Escape", price: 90000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/couple%20paradis%20escape.jpg" },
                { id: "c2", name: "Paradise Gold", price: 250000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/paradise-gold.jpg" },
                { id: "c3", name: "Royal VIP Romance", price: 350000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/royal%20romance.jpg" }
            ],
            group4: [
                { id: "g4_1", name: "Crew Chill (4)", price: 230000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/group-action.jpg" },
                { id: "g4_2", name: "Vibes & Memories (4)", price: 350000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/dinner-setup.jpg" }
            ],
            group6: [
                { id: "g6_1", name: "Friends & Waves (6)", price: 270000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/group-action.jpg" }
            ],
            concierge: [
                { id: "con1", name: "Private Photographer", price: 30000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/4K6A7572.jpg" },
                { id: "con2", name: "Luxury Transport", price: 50000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/4K6A7154.jpg" },
                { id: "con3", name: "Beach Bonfire Setup", price: 20000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/4K6A7343.jpg" }
            ]
        };

        function fetchReviews() {
            const scriptURL = "https://script.google.com/macros/s/AKfycbwGlQJUMBz-88OabMig8E8tYuhlidNrd1CHkAmZYtlNMPC5c3FVKQEqJOP7SePr4Fyt/exec";
            fetch(scriptURL)
            .then(r => r.json())
            .then(data => {
                let reviews = typeof data === 'string' ? JSON.parse(data) : data;
                const container = document.getElementById('dynamic-reviews');
                if(reviews && reviews.length > 0) {
                    container.innerHTML = reviews.map(item => `
                        <div class="review-card">
                            <div class="text-yellow-500 mb-4">${'★'.repeat(item.rating || 5)}${'☆'.repeat(5-(item.rating || 5))}</div>
                            <p class="text-white/80 italic text-sm mb-6">"${item.review || item.text}"</p>
                            <h6 class="text-white font-black uppercase text-[10px]">- ${item.name}</h6>
                        </div>
                    `).join('');
                }
            });
        }

        function renderUI() {
            const grid = document.getElementById('package-grid');
            grid.innerHTML = (servicesData[currentCategory] || []).map(item => {
                const isS = cart.some(c => c.id === item.id);
                return `<div class="package-card ${isS ? 'border-[#fbbf24]' : 'border-slate-800'}">
                    <div class="h-48 overflow-hidden"><img src="${item.img}" class="w-full h-full object-cover"></div>
                    <div class="p-6">
                        <h4 class="text-lg font-black uppercase mb-1 text-white">${item.name}</h4>
                        <p class="text-md font-bold mb-4 text-yellow-500">${formatPrice(item.price)}</p>
                        <button onclick="toggleService('${item.id}', '${item.name}', ${item.price})" class="w-full py-3 ${isS ? 'bg-yellow-500 text-black' : 'bg-slate-800'} font-black rounded-xl uppercase text-[9px]">
                            ${isS ? 'ADDED ✓' : 'ADD TO TRIP'}
                        </button>
                    </div>
                </div>`;
            }).join('');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = `Total: ${formatPrice(total)}`;
            document.getElementById('cart-count').innerText = `${cart.length} Selected`;
            document.getElementById('checkout-bar').classList.toggle('translate-y-full', cart.length === 0);
        }

        function formatPrice(v) { 
            const conv = v * rates[currentCurrency]; 
            return currentCurrency === 'XAF' ? new Intl.NumberFormat('fr-CM').format(v) + ' CFA' : (currentCurrency === 'EUR' ? '€' : '$') + conv.toFixed(2);
        }
        function toggleService(id, name, price) {
            const idx = cart.findIndex(i => i.id === id);
            idx > -1 ? cart.splice(idx, 1) : cart.push({ id, name, price });
            renderUI();
        }
        function updateCurrency() { currentCurrency = document.getElementById('currency-select').value; renderUI(); }
        function switchCategory(cat) { currentCategory = cat; document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active-tab', b.id === 'tab-' + cat)); renderUI(); }
        function processWhatsApp() {
            let msg = "WONDERWAY BOOKING:\n" + cart.map((item, i) => `${i+1}. ${item.name}`).join('\n') + `\n*TOTAL: ${formatPrice(cart.reduce((s, it) => s + it.price, 0))}*`;
            window.open(`https://wa.me/237653827999?text=${encodeURIComponent(msg)}`, '_blank');
        }
        window.onload = () => { renderUI(); fetchReviews(); };
    </script>
</body>
</html>
