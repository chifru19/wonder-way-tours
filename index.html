<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderWay | Kribi Collection</title>
    <link rel="icon" href="images/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Outfit:wght@200;400;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; scroll-behavior: smooth; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .active-tab { background: #fbbf24 !important; color: black !important; border-color: #fbbf24 !important; }
        .package-card, .service-row { transition: all 0.4s ease; border: 1px solid #1e293b; background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border-radius: 32px; overflow: hidden; }
        .package-card:hover { transform: translateY(-12px); border-color: #fbbf24; box-shadow: 0 25px 50px -12px rgba(251, 191, 36, 0.3); }
        .service-row { border-radius: 20px; cursor: pointer; margin-bottom: 12px; border: 1px solid #1e293b; }
        .selected-item { border-color: #fbbf24 !important; background: rgba(251, 191, 36, 0.15) !important; }
        input, textarea { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        
        .star-rating { display: flex; flex-direction: row-reverse; gap: 5px; justify-content: flex-end; }
        .star-rating input { display: none; }
        .star-rating label { cursor: pointer; font-size: 30px; color: #334155; transition: color 0.2s; }
        .star-rating label:before { content: '★'; }
        .star-rating input:checked ~ label, .star-rating label:hover, .star-rating label:hover ~ label { color: #fbbf24 !important; }
        
        #booking-engine { transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); max-height: 0; opacity: 0; overflow: hidden; pointer-events: none; }
        #booking-engine.manifest-visible { max-height: 5000px; opacity: 1; pointer-events: auto; margin-top: 5rem; margin-bottom: 5rem; }

        .review-card { animation: fadeIn 0.8s ease-out forwards; background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 24px; border: 1px solid #334155; padding: 40px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .immersive-footer { position: relative; min-height: 90vh; display: flex; align-items: center; justify-content: center; background-color: #0f172a; overflow: hidden; }
        .footer-bg-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .footer-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #0f172a 20%, rgba(15, 23, 42, 0.6) 60%, transparent 100%); }
    </style>
</head>
<body class="pt-24">
    <nav class="fixed top-0 w-full z-50 bg-[#0f172a]/95 backdrop-blur-xl px-6 py-5 flex flex-col md:flex-row justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-4 mb-4 md:mb-0">
            <img src="images/logo.png" class="w-12 h-12 rounded-full border-2 border-yellow-500 bg-white">
            <div class="flex flex-col text-left"><span class="font-black text-xl hero-font uppercase">WonderWay</span><span class="text-[8px] uppercase tracking-[0.4em] text-yellow-500 font-black">Official Collection</span></div>
        </div>
        <select id="currency-select" onchange="updateCurrency()" class="bg-slate-800 text-white text-[10px] font-bold uppercase rounded-xl p-3 outline-none cursor-pointer">
            <option value="XAF">CFA Franc (XAF)</option><option value="EUR">Euro (€)</option><option value="USD">Dollar ($)</option>
        </select>
    </nav>

    <header class="pt-24 pb-12 px-6 text-center">
        <h1 class="hero-font text-6xl md:text-8xl font-black uppercase mb-6 tracking-tighter leading-none text-white">Kribi <span class="text-yellow-500">Luxury</span></h1>
        <div class="flex flex-wrap justify-center gap-3">
            <button onclick="switchCategory('activities')" id="tab-activities" class="tab-btn active-tab px-8 py-4 rounded-2xl border border-slate-700 font-black text-[11px] uppercase transition-all">Activities</button>
            <button onclick="switchCategory('couples')" id="tab-couples" class="tab-btn px-8 py-4 rounded-2xl border border-slate-700 font-black text-[11px] uppercase transition-all">Couples</button>
            <button onclick="switchCategory('group4')" id="tab-group4" class="tab-btn px-8 py-4 rounded-2xl border border-slate-700 font-black text-[11px] uppercase transition-all">Groups (4)</button>
            <button onclick="switchCategory('group6')" id="tab-group6" class="tab-btn px-8 py-4 rounded-2xl border border-slate-700 font-black text-[11px] uppercase transition-all">Groups (6)</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="package-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10 mb-32"></div>

        <section id="booking-engine">
            <div class="flex flex-col items-center text-center mb-12"><h2 class="hero-font text-4xl font-black uppercase text-white">Full Service <span class="text-yellow-500">Manifest</span></h2></div>
            <div class="bg-slate-900/50 rounded-[40px] border border-slate-800 p-10"><div id="service-list" class="space-y-4"></div></div>
        </section>

        <section id="review-submission" class="mt-40 pt-20 border-t border-slate-800/50">
            <div class="max-w-2xl mx-auto bg-slate-900/80 p-10 md:p-16 rounded-[40px] border border-slate-800 shadow-2xl text-center">
                <h2 class="hero-font text-4xl font-black uppercase mb-8">Guest <span class="text-yellow-500">Voice</span></h2>
                <form id="reviewForm" class="space-y-6 text-left">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" name="Name" placeholder="Your Name" class="w-full p-5 rounded-2xl" required>
                        <input type="text" name="City" placeholder="Your City" class="w-full p-5 rounded-2xl" required>
                    </div>
                    <div class="flex justify-between items-center bg-slate-800/30 p-6 rounded-2xl border border-slate-800">
                        <span class="text-[10px] uppercase font-black text-slate-400">Rating:</span>
                        <div class="star-rating">
                            <input type="radio" name="Stars" id="star-5" value="5" required><label for="star-5"></label>
                            <input type="radio" name="Stars" id="star-4" value="4"><label for="star-4"></label>
                            <input type="radio" name="Stars" id="star-3" value="3"><label for="star-3"></label>
                            <input type="radio" name="Stars" id="star-2" value="2"><label for="star-2"></label>
                            <input type="radio" name="Stars" id="star-1" value="1"><label for="star-1"></label>
                        </div>
                    </div>
                    <textarea name="Review" placeholder="Describe your experience..." rows="5" class="w-full p-6 rounded-3xl" required></textarea>
                    <button type="submit" id="submitBtn" class="w-full py-6 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs shadow-lg hover:bg-white transition-all">Post Live Review</button>
                </form>
            </div>
        </section>
        <section class="mt-40"><h2 class="hero-font text-5xl font-black uppercase text-center mb-16 text-white">Guest <span class="text-slate-500">Stories</span></h2><div id="dynamic-reviews" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div></section>
    </main>

    <div id="checkout-bar" class="fixed bottom-0 w-full bg-[#0f172a]/95 backdrop-blur-2xl border-t-4 border-yellow-500 p-8 z-[100] transform translate-y-full transition-transform">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-left"><p id="cart-count" class="text-yellow-500 font-black text-[10px] uppercase mb-1">0 Selected</p><h3 id="cart-total" class="text-3xl font-black hero-font uppercase">Total: 0 CFA</h3></div>
            <div class="flex gap-4"><button onclick="clearCart()" class="px-8 py-5 border border-slate-700 text-slate-400 font-bold rounded-2xl uppercase text-[10px]">Reset</button><button onclick="processWhatsApp()" class="px-16 py-5 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs shadow-xl">Confirm WhatsApp</button></div>
        </div>
    </div>

    <footer class="immersive-footer"><img src="images/footer.jpg" class="footer-bg-image"><div class="footer-overlay"></div><div class="relative z-10 text-center px-6">
        <h3 class="hero-font text-5xl md:text-7xl font-black uppercase mb-12 italic text-white leading-tight">"Luxury is affordable."</h3>
        <div class="bg-black/40 backdrop-blur-md p-10 rounded-[40px] border border-white/10 inline-block">
            <p class="text-yellow-500 text-[10px] font-black uppercase mb-2 tracking-[0.4em]">Frank Fru</p>
            <div class="flex flex-col gap-1 items-center">
                <a href="https://frankfru.com" target="_blank" class="text-white hover:text-yellow-500 uppercase text-[12px] font-black tracking-widest transition-all underline underline-offset-4 decoration-yellow-500/30">My Portfolio</a>
                <a href="https://frankfru.com" target="_blank" class="text-white hover:text-yellow-500 uppercase text-[10px] font-black tracking-widest opacity-70">frankfru.com</a>
            </div>
        </div>
        <p class="mt-12 text-white/20 text-[10px] uppercase tracking-[0.5em]">© 2026 WonderWay Tours Cameroon.</p>
    </div></footer>

    <script>
        let cur = 'XAF', cat = 'activities', cart = [], rates = { XAF: 1, EUR: 0.0015, USD: 0.0016 };
        // Deployment and Sheet URLs from your screenshots
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzTy60L4Xvq5zd_Ra5i3WbM7iKMzfBQBXSj5KKKyPo85JQH9LBKIfGdie3eHNuzs62/exec'; 
        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnv5OBvO2JxZ-PSZGaKGaxLl76QS5pv-28btG5l_N5vG_KREbPuE2Wgtw4511LqcQpQYhs9UY1aGp3/pub?gid=65154260&single=true&output=csv';

        const data = {
            activities: [{ id: "a1", name: "Jet Ski Adventure", price: 10000, img: "images/jetski-action.jpg", features: ["15 Mins", "Safety"] }, { id: "a2", name: "Horse Riding", price: 2000, img: "images/horse-riding.jpg", features: ["Beach Sunset"] }, { id: "a3", name: "Quad Biking", price: 5000, img: "images/Quad.jpg", features: ["Coastal Ride"] }, { id: "a4", name: "Sip & Paint", price: 15000, img: "images/sip-paint.jpg", features: ["2-Hour Creative"] }, { id: "a5", name: "Museum Visit", price: 2000, img: "images/museum.jpg", features: ["Heritage Tour"] }],
            couples: [{ id: "c1", name: "Mini Love", price: 90000, img: "images/couple paradis escape.jpg", features: ["2 Days Villa"] }, { id: "c2", name: "Paradise Gold", price: 250000, img: "images/sip-paint.jpg", features: ["Beach Dinner"] }, { id: "c3", name: "Royal VIP", price: 350000, img: "images/royal romance.jpg", features: ["Boat Cruise"] }],
            group4: [{ id: "g4_1", name: "Crew Chill", price: 230000, img: "images/group-action.jpg", features: ["Villa Stay"] }, { id: "g4_2", name: "Vibes & Memories", price: 350000, img: "images/dinner-setup.jpg", features: ["Private Sip & Paint"] }],
            group6: [{ id: "g6_1", name: "Friends & Waves", price: 270000, img: "images/group-action.jpg", features: ["6-Pax Villa Stay"] }]
        };

        async function loadReviews() {
            try {
                const response = await fetch(sheetURL + '&v=' + Date.now()); const txt = await response.text();
                const rows = txt.split('\n').filter(r => r.trim() !== "");
                let html = ''; rows.slice(1).reverse().forEach(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 5) {
                        const name = cols[1].replace(/"/g, '').trim(), 
                              review = cols[2].replace(/"/g, '').trim(), 
                              city = cols[3].replace(/"/g, '').trim(), 
                              stars = parseInt(cols[4]) || 5;
                        html += `<div class="review-card"><div><div class="text-yellow-500 mb-4 text-xl">${'★'.repeat(stars)}</div><p class="italic text-sm text-slate-300">"${review}"</p></div><p class="text-white font-black text-[10px] mt-8 uppercase tracking-widest">— ${name}, ${city}</p></div>`;
                    }
                });
                document.getElementById('dynamic-reviews').innerHTML = html || '<p>Connecting stories...</p>';
            } catch (e) { console.error(e); }
        }

        function renderUI() {
            document.getElementById('package-grid').innerHTML = (data[cat] || []).map(item => {
                const isS = cart.some(c => c.id === item.id);
                return `<div class="package-card ${isS ? 'selected-item' : ''}"><img src="${item.img}" class="w-full h-56 object-cover"><div class="p-8 flex flex-col flex-grow text-left"><h4 class="text-2xl font-black mb-1 hero-font uppercase tracking-tight">${item.name}</h4><p class="text-xl font-bold mb-6 text-slate-300">${format(item.price)}</p><button onclick="toggleService('${item.id}', '${item.name}', ${item.price})" class="w-full py-4 mt-auto ${isS ? 'bg-yellow-500 text-black' : 'bg-white text-black'} font-black rounded-xl uppercase text-[10px]">${isS ? 'Added ✓' : 'Add to Trip'}</button></div></div>`;
            }).join('');
            document.getElementById('service-list').innerHTML = Object.values(data).flat().map(item => {
                const isS = cart.some(c => c.id === item.id);
                return `<div onclick="toggleService('${item.id}', '${item.name}', ${item.price})" class="service-row flex items-center justify-between p-6 ${isS ? 'selected-item' : ''}"><span class="text-sm font-black uppercase text-white">${item.name}</span><span class="text-xs font-bold text-yellow-500">${format(item.price)}</span></div>`;
            }).join('');
        }

        function toggleService(id, name, price) {
            const idx = cart.findIndex(i => i.id === id);
            if (idx > -1) { cart.splice(idx, 1); } else { 
                cart.push({ id, name, price }); 
                document.getElementById('booking-engine').classList.add('manifest-visible');
            }
            updateCartUI(); renderUI();
        }

        function updateCartUI() {
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            document.getElementById('cart-total').innerText = format(total);
            document.getElementById('cart-count').innerText = `${cart.length} Selected`;
            document.getElementById('checkout-bar').classList.toggle('translate-y-full', cart.length === 0);
        }

        function clearCart() { cart = []; updateCartUI(); renderUI(); document.getElementById('booking-engine').classList.remove('manifest-visible'); }
        function format(v) { return cur === 'XAF' ? new Intl.NumberFormat().format(v) + ' CFA' : (cur === 'EUR' ? '€' : '$') + (v * rates[cur]).toFixed(2); }
        function updateCurrency() { cur = document.getElementById('currency-select').value; renderUI(); updateCartUI(); }
        function switchCategory(c) { cat = c; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab')); document.getElementById('tab-' + cat).classList.add('active-tab'); renderUI(); }
        function processWhatsApp() { window.open("https://wa.me/237653827999?text=" + encodeURIComponent("WonderWay Booking Request:\n" + cart.map(i => i.name).join("\n") + "\nTotal: " + document.getElementById('cart-total').innerText), '_blank'); }

        document.getElementById('reviewForm').addEventListener('submit', async e => {
            e.preventDefault(); const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = "POSTING...";
            try {
                await fetch(scriptURL, { method: 'POST', body: new FormData(e.target), mode: 'no-cors' });
                alert("Story Published!"); e.target.reset(); btn.disabled = false; btn.innerText = "Post Live Review";
                loadReviews();
            } catch (err) { btn.disabled = false; }
        });

        window.onload = () => { loadReviews(); renderUI(); };
    </script>
</body>
</html>
