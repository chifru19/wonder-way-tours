<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderWay | Kribi Experience Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Outfit:wght@200;400;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .active-tab { background: #fbbf24 !important; color: black !important; border-color: #fbbf24 !important; }
        .experience-card { transition: all 0.2s; border: 2px solid transparent; cursor: pointer; }
        .experience-card:hover { transform: translateY(-3px); }
        .experience-card.selected { border-color: #fbbf24; background-color: #fffbeb; }
    </style>
</head>
<body class="overflow-x-hidden pt-28">

    <nav class="fixed top-0 w-full z-50 bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-yellow-500 bg-white flex items-center justify-center">
                <img src="images/logo.png" alt="WonderWay Logo" class="w-full h-full object-cover">
            </div>
            <span class="font-bold text-lg tracking-tighter uppercase hero-font border-l-4 border-yellow-500 pl-3">WonderWay</span>
        </div>

        <div class="flex items-center gap-6">
            <a href="#" class="hover:text-yellow-500"><i class="fab fa-tiktok"></i></a>
            <a href="#" class="hover:text-yellow-500"><i class="fab fa-instagram"></i></a>
            <a href="#" class="hover:text-yellow-500"><i class="fab fa-facebook"></i></a>
        </div>

        <div class="flex bg-slate-800 rounded-lg p-1">
            <button onclick="setCurrency('CFA', 1)" id="curr-CFA" class="px-4 py-1 rounded-md text-xs font-bold bg-white text-slate-900 shadow-sm">CFA</button>
            <button onclick="setCurrency('USD', 0.0016)" id="curr-USD" class="px-4 py-1 rounded-md text-xs font-bold text-white">USD</button>
        </div>
    </nav>

    <header class="relative pb-16 px-6 text-center bg-[#0f172a] text-white">
        <h1 class="hero-font text-5xl md:text-7xl font-black uppercase mb-10 tracking-tighter">The Kribi <span class="text-yellow-500">Collection</span></h1>
        
        <div class="flex flex-wrap justify-center gap-2">
            <button onclick="showCategory('activities')" id="tab-activities" class="cat-tab active-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest">Activities</button>
            <button onclick="showCategory('couples')" id="tab-couples" class="cat-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest text-white">Couples</button>
            <button onclick="showCategory('group4')" id="tab-group4" class="cat-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest text-white">Group of 4</button>
            <button onclick="showCategory('group6')" id="tab-group6" class="cat-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest text-white">Group of 6</button>
            <button onclick="showCategory('escapes')" id="tab-escapes" class="cat-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest text-white">Event Escapes</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-2">
                <h2 class="text-2xl font-black mb-8 text-slate-900 uppercase">Choose Your Experiences</h2>
                <div id="experience-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>
            
            <div class="lg:col-span-1">
                <div class="sticky top-28 bg-white p-8 rounded-3xl border border-slate-200 shadow-xl">
                    <h3 class="hero-font text-xl font-black mb-4 uppercase text-slate-900">Your Summary</h3>
                    <div id="summary-list" class="space-y-4 mb-8 min-h-[120px] text-sm text-slate-500 italic">Select activities...</div>
                    <div class="border-t pt-6">
                        <div class="flex justify-between items-center mb-6">
                            <span class="font-bold text-slate-400 uppercase text-xs">Total</span>
                            <span id="total-price" class="text-4xl font-black text-slate-900">0 CFA</span>
                        </div>
                        <button class="w-full py-5 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs tracking-widest shadow-lg">Book Now</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-[#0f172a] py-20 text-center text-white border-t border-slate-800">
        <div class="mb-10">
            <img src="images/sip and paint.jpg" class="mx-auto rounded-3xl shadow-2xl max-w-sm border-4 border-slate-700">
        </div>
        <p class="text-slate-500 text-[10px] uppercase tracking-widest font-semibold">&copy; 2026 WonderWay Tours</p>
        <p class="text-yellow-500 text-[9px] uppercase tracking-[0.4em] font-black mt-2">Engineered by Frank Fru</p>
    </footer>

    <script>
        const categories = {
            activities: [
                { id: 1, name: "Quad/ATV", price: 5000, info: "Per Turn", img: "images/Quad.jpg" },
                { id: 2, name: "Canoe Exploration", price: 3000, info: "Lobe River", img: "images/canoe.jpg" },
                { id: 3, name: "Pigmy Village", price: 10000, info: "Cultural Entry", img: "images/pigmi village.jpg" },
                { id: 4, name: "Sip & Paint", price: 15000, info: "Per Person", img: "images/sip and paint.jpg" },
                { id: 5, name: "Oceanfront Dinner", price: 12000, info: "Private Table", img: "images/dinner.jpg" },
                { id: 6, name: "Seaport Visit", price: 2000, info: "Guided Tour", img: "images/seaport visit.jpg" }
            ],
            couples: [
                { id: 7, name: "Royal Romance", price: 150000, info: "Full Package", img: "images/royal romance.jpg" },
                { id: 8, name: "Paradis Escape", price: 85000, info: "Day Trip", img: "images/couple paradis escape.jpg" }
            ]
        };

        let selected = [];
        let view = 'activities';
        let rate = 1;
        let currency = 'CFA';

        function showCategory(c) {
            view = c;
            document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active-tab', 'text-slate-900'));
            document.getElementById('tab-'+c).classList.add('active-tab');
            render();
        }

        function toggle(id) {
            const idx = selected.indexOf(id);
            if(idx > -1) selected.splice(idx, 1);
            else selected.push(id);
            render();
        }

        function render() {
            const grid = document.getElementById('experience-grid');
            const items = categories[view] || [];
            grid.innerHTML = items.map(i => `
                <div onclick="toggle(${i.id})" class="experience-card p-4 rounded-3xl bg-white border border-slate-100 shadow-sm ${selected.includes(i.id) ? 'selected' : ''}">
                    <div class="flex items-center gap-4">
                        <img src="${i.img}" class="w-16 h-16 rounded-2xl object-cover shadow-sm">
                        <div class="flex-grow">
                            <h4 class="font-black text-slate-900 text-sm">${i.name}</h4>
                            <p class="text-[9px] text-slate-400 font-bold uppercase">${i.info}</p>
                            <span class="text-yellow-600 font-black text-sm">${(i.price * rate).toLocaleString()} ${currency}</span>
                        </div>
                        <i class="fas ${selected.includes(i.id) ? 'fa-check-circle text-yellow-500' : 'fa-plus text-slate-200'}"></i>
                    </div>
                </div>
            `).join('');

            const summary = document.getElementById('summary-list');
            const allItems = Object.values(categories).flat();
            const picked = allItems.filter(i => selected.includes(i.id));
            summary.innerHTML = picked.length ? picked.map(i => `<div class="flex justify-between uppercase text-[10px]"><span>${i.name}</span><b>${(i.price * rate).toLocaleString()}</b></div>`).join('') : "Select activities...";
            
            const total = picked.reduce((s, i) => s + i.price, 0);
            document.getElementById('total-price').innerText = `${(total * rate).toLocaleString()} ${currency}`;
        }

        function setCurrency(c, r) { rate = r; currency = c; render(); }
        render();
    </script>
</body>
</html>
