<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderWay | Kribi Collection</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Outfit:wght@200;400;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; scroll-behavior: smooth; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .active-tab { background: #fbbf24 !important; color: black !important; border-color: #fbbf24 !important; }
        
        /* CARD STYLING */
        .package-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #1e293b; 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px);
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .package-card:hover { transform: translateY(-12px); border-color: #fbbf24; box-shadow: 0 25px 50px -12px rgba(251, 191, 36, 0.3); }
        
        /* HIDDEN MANIFEST FOLDER LOGIC */
        #booking-engine { display: none; opacity: 0; transform: translateY(20px); transition: all 0.6s ease; }
        .folder-visible { display: block !important; opacity: 1 !important; transform: translateY(0) !important; }

        .service-row { border-radius: 20px; margin-bottom: 12px; padding: 20px; display: flex; justify-content: space-between; border: 1px solid #1e293b; background: rgba(255,255,255,0.05); }
        
        .review-card { background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 24px; border: 1px solid #334155; padding: 40px; }

        /* FOOTER SYSTEM */
        .immersive-footer { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #0f172a; }
        .footer-bg-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .footer-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #0f172a 20%, rgba(15, 23, 42, 0.4) 60%, transparent 100%); }
    </style>
</head>

<body class="pt-24">
    <nav class="fixed top-0 w-full z-50 bg-[#0f172a]/95 backdrop-blur-xl px-6 py-5 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-yellow-500 bg-white">
                <img src="https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/logo.png" class="w-full h-full object-cover">
            </div>
            <div class="flex flex-col text-left">
                <span class="font-black text-xl hero-font text-white uppercase leading-none">WonderWay</span>
                <span class="text-[8px] uppercase tracking-widest text-yellow-500 font-black">Official Collection</span>
            </div>
        </div>
    </nav>

    <header class="pt-24 pb-12 px-6 text-center">
        <h1 class="hero-font text-6xl md:text-8xl font-black uppercase mb-6 tracking-tighter leading-none">Kribi <span class="text-yellow-500">Luxury</span></h1>
        <div class="flex flex-wrap justify-center gap-3">
            <button onclick="switchCategory('activities')" id="tab-activities" class="tab-btn active-tab px-6 py-4 rounded-2xl border border-slate-700 font-black text-[10px] uppercase tracking-widest">Activities</button>
            <button onclick="switchCategory('couples')" id="tab-couples" class="tab-btn px-6 py-4 rounded-2xl border border-slate-700 font-black text-[10px] uppercase tracking-widest">Couples</button>
            <button onclick="switchCategory('group4')" id="tab-group4" class="tab-btn px-6 py-4 rounded-2xl border border-slate-700 font-black text-[10px] uppercase tracking-widest">Groups (4)</button>
            <button onclick="switchCategory('group6')" id="tab-group6" class="tab-btn px-6 py-4 rounded-2xl border border-slate-700 font-black text-[10px] uppercase tracking-widest">Groups (6)</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 mb-40">
        <div id="package-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>

        <section id="booking-engine" class="mt-32">
            <div class="flex flex-col items-center text-center mb-12">
                <h2 class="hero-font text-4xl font-black uppercase text-white">Service <span class="text-yellow-500">Manifest</span></h2>
                <p class="text-slate-500 text-[10px] uppercase font-black tracking-widest mt-2">Personalize your journey</p>
            </div>
            <div class="bg-slate-900/50 rounded-[40px] border border-slate-800 p-10 max-w-4xl mx-auto">
                <div id="service-list" class="space-y-4 text-left mb-10"></div>
                <div class="pt-8 border-t border-white/10 flex flex-col md:flex-row justify-between items-center gap-6">
                    <h3 id="cart-total-display" class="text-3xl font-black hero-font uppercase">Total: 0 CFA</h3>
                    <button onclick="sendWhatsApp()" class="px-12 py-6 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl hover:bg-white transition-all">
                        <i class="fab fa-whatsapp mr-2"></i> Confirm Selection
                    </button>
                </div>
            </div>
        </section>

        <section id="feedback" class="mt-40">
            <h2 class="hero-font text-5xl font-black uppercase text-center mb-16">Guest <span class="text-slate-500">Stories</span></h2>
            <div id="dynamic-reviews" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <p class="text-center col-span-full opacity-50 uppercase text-[10px] tracking-widest">Connecting stories...</p>
            </div>
        </section>
    </main>

    <footer class="immersive-footer">
        <img src="https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/footer.jpg" class="footer-bg-image">
        <div class="footer-overlay"></div>
        <div class="relative z-10 max-w-4xl mx-auto text-center px-6">
            <h3 class="hero-font text-4xl md:text-6xl font-black uppercase mb-6 text-white italic">"Luxury is affordable."</h3>
            <div class="pt-12 border-t border-white/10">
                <span class="text-white font-black uppercase text-xs tracking-[0.3em] mb-4 block">Engineering by Frank Fru</span>
                <div class="flex gap-10 justify-center">
                    <a href="https://frankfru.com" target="_blank" class="text-white hover:text-yellow-500 uppercase text-[10px] font-black tracking-widest">Website</a>
                    <a href="https://frankfru.com" target="_blank" class="text-white hover:text-yellow-500 uppercase text-[10px] font-black tracking-widest">Portfolio</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        let currentCategory = 'activities'; 
        let cart = [];

        const servicesData = {
            activities: [
                { id: "a1", name: "Jet Ski", price: 10000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/jetski-action.jpg" },
                { id: "a2", name: "Horse Riding", price: 2000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/horse-riding.jpg" },
                { id: "a3", name: "Quad Biking", price: 5000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/Quad.jpg" },
                { id: "a4", name: "Sip & Paint", price: 15000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/sip-paint.jpg" },
                { id: "a5", name: "Museum Visit", price: 2000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/museum.jpg" },
                { id: "a6", name: "Seaport Visit", price: 2000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/seaport%20visit.jpg" },
                { id: "a7", name: "Canoe Trip", price: 3000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/canoe.jpg" },
                { id: "a8", name: "Pigmi Village", price: 15000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/pigmi%20village.jpg" }
            ],
            couples: [
                { id: "c1", name: "Mini Love Escape", price: 90000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/couple%20paradis%20escape.jpg" },
                { id: "c2", name: "Paradise Gold", price: 250000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/sip-paint.jpg" },
                { id: "c3", name: "Royal VIP Romance", price: 350000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/royal%20romance.jpg" }
            ],
            group4: [
                { id: "g4_1", name: "Crew Chill (4)", price: 230000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/group-action.jpg" },
                { id: "g4_2", name: "Vibes & Memories (4)", price: 350000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/dinner-setup.jpg" }
            ],
            group6: [
                { id: "g6_1", name: "Friends & Waves (6)", price: 270000, img: "https://raw.githubusercontent.com/chifru19/wonder-way-tours/main/images/group-action.jpg" }
            ]
        };

        function fetchReviews() {
            google.script.run.withSuccessHandler(h => {
                if(h) document.getElementById('dynamic-reviews').innerHTML = h;
            }).loadReviews();
        }

        function renderUI() {
            const grid = document.getElementById('package-grid');
            grid.innerHTML = (servicesData[currentCategory] || []).map(item => {
                const isS = cart.some(c => c.id === item.id);
                return `
                <div class="package-card ${isS ? 'selected-item' : ''}">
                    <div class="h-48 overflow-hidden"><img src="${item.img}" class="w-full h-full object-cover"></div>
                    <div class="p-6 text-left flex-grow flex flex-col justify-between">
                        <div>
                            <h4 class="text-lg font-black uppercase mb-1">${item.name}</h4>
                            <p class="text-md font-bold mb-4 text-yellow-500">${item.price.toLocaleString()} CFA</p>
                        </div>
                        <button onclick="toggleService('${item.id}', '${item.name}', ${item.price})" class="w-full py-3 ${isS ? 'bg-yellow-500 text-black' : 'bg-slate-800 text-white'} font-black rounded-xl uppercase text-[9px] tracking-widest">
                            ${isS ? 'ADDED ✓' : 'ADD TO TRIP'}
                        </button>
                    </div>
                </div>`;
            }).join('');

            const list = document.getElementById('service-list');
            list.innerHTML = cart.map(item => `
                <div class="service-row">
                    <span class="text-sm font-black uppercase text-white">${item.name}</span>
                    <span class="text-yellow-500 font-bold">${item.price.toLocaleString()} CFA</span>
                </div>`).join('');
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total-display').innerText = `Total: ${total.toLocaleString()} CFA`;
        }

        function toggleService(id, name, price) {
            const idx = cart.findIndex(i => i.id === id);
            idx > -1 ? cart.splice(idx, 1) : cart.push({ id, name, price });
            const manifest = document.getElementById('booking-engine');
            cart.length > 0 ? manifest.classList.add('folder-visible') : manifest.classList.remove('folder-visible');
            renderUI();
        }

        function sendWhatsApp() {
            if (cart.length === 0) return;
            let msg = "WONDERWAY BOOKING REQUEST:\n-------------------------\n";
            cart.forEach((item, i) => { msg += `${i+1}. ${item.name} - ${item.price.toLocaleString()} CFA\n`; });
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            msg += `-------------------------\nTOTAL: ${total.toLocaleString()} CFA\n-------------------------`;
            window.open(`https://wa.me/237653827999?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function switchCategory(cat) { 
            currentCategory = cat; 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab')); 
            document.getElementById('tab-' + cat).classList.add('active-tab'); 
            renderUI(); 
        }

        window.onload = () => { renderUI(); fetchReviews(); };
    </script>
</body>
</html>
