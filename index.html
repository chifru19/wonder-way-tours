<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonder Way | Authentic Kribi Coastal Tours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Outfit:wght@200;400;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .package-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #e2e8f0; 
            border-radius: 40px; 
            background: white; 
        }
        .package-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); 
        }
        .active-tab { background: #fbbf24; color: black; border-color: #fbbf24; }
        .gold-highlight { border: 2px solid #fbbf24; position: relative; }
        .gold-highlight::after { 
            content: "MOST BOOKED"; 
            position: absolute; 
            top: -15px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #fbbf24; 
            color: black; 
            font-size: 10px; 
            font-weight: 900; 
            padding: 4px 15px; 
            border-radius: 50px; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 bg-slate-900/90 backdrop-blur-md px-6 py-4 border-b border-slate-800 flex justify-between items-center text-white">
        <div class="flex items-center gap-3">
            <img src="images/logo.jpg" class="w-8 h-8 rounded-full border border-yellow-500" alt="W">
            <span class="font-black text-xl tracking-tighter uppercase hero-font">Wonder Way</span>
        </div>
        <div class="flex bg-slate-800 p-1 rounded-xl">
            <button onclick="setCurrency('CFA', 1)" id="curr-CFA" class="px-4 py-1 rounded-lg text-xs font-black bg-white text-slate-900 shadow-sm transition-all">CFA</button>
            <button onclick="setCurrency('USD', 0.0016)" id="curr-USD" class="px-4 py-1 rounded-lg text-xs font-black transition-all">USD</button>
        </div>
    </nav>

    <header class="pt-48 pb-24 px-6 text-center bg-slate-900 text-white relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full bg-gradient-to-b from-yellow-500/10 to-transparent pointer-events-none"></div>

        <div class="relative z-10">
            <div class="mb-10 inline-block p-2 bg-black rounded-[40px] shadow-2xl border border-slate-800">
                <img src="images/logo.jpg" alt="Wonder Way Official Logo" class="w-64 md:w-80 h-auto rounded-[30px]" onerror="this.src='https://via.placeholder.com/400x400?text=Logo+Not+Found'">
            </div>
            
            <h1 class="hero-font text-5xl md:text-8xl font-black tracking-tighter mb-6 uppercase leading-none">
                The Kribi <span class="text-yellow-500">Collection.</span>
            </h1>
            
            <p class="text-slate-400 max-w-2xl mx-auto text-sm italic mb-12 leading-relaxed">
                "Because most clients arrive with private cars or bikes, we don't include transport in our packages to keep your luxury stay affordable."
            </p>

            <div class="flex flex-wrap justify-center gap-4">
                <button onclick="showGroup('couple')" id="tab-couple" class="group-tab active-tab px-10 py-4 rounded-2xl border-2 border-yellow-500 font-black text-sm transition tracking-widest uppercase">Couples</button>
                <button onclick="showGroup('group4')" id="tab-group4" class="group-tab px-10 py-4 rounded-2xl border-2 border-slate-700 font-black text-sm transition tracking-widest uppercase hover:border-yellow-500">Group of 4</button>
                <button onclick="showGroup('group6')" id="tab-group6" class="group-tab px-10 py-4 rounded-2xl border-2 border-slate-700 font-black text-sm transition tracking-widest uppercase hover:border-yellow-500">Group of 6</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20">
        <div id="package-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </main>

    <footer class="bg-slate-900 text-white py-20 px-6 text-center">
        <p class="hero-font text-2xl font-black mb-4 uppercase tracking-tighter">Wonder Way Tours</p>
        <div class="w-12 h-1 bg-yellow-500 mx-auto mb-6"></div>
        <p class="text-slate-400 text-xs tracking-[0.3em] uppercase mb-2">Designed & Secured By</p>
        <p class="text-yellow-500 font-black text-xl tracking-widest uppercase italic">Frank Fru</p>
        <p class="text-slate-600 text-[10px] mt-4 uppercase">Cybersecurity Specialist & Developer 2026</p>
    </footer>

    <script>
        const store = {
            couple: [
                { name: "Mini Love Adventure", tier: "Silver", price: 90000, img: "images/quad.jpg", items: ["2 Days Lodging", "Jet Ski", "Quad Racing", "Museum Visit", "Lobe Falls Tour", "Visit Pygmies", "Visit 2 Beaches", "Mini Boat Tour", "Mobile Content & Pictures"] },
                { name: "Couple’s Paradise Escape", tier: "Gold", price: 250000, img: "images/sip-paint.jpg", items: ["Everything in Silver", "Sip and Paints", "Romantic Dinner", "Camp Fire"] },
                { name: "The Royal Romance", tier: "Premium", price: 350000, img: "images/seaport.jpg", items: ["Everything in Gold", "Boat Cruise with Wine", "Seaport Visit", "Beach Couple Games"] }
            ],
            group4: [
                { name: "Crew Chill Package", tier: "Explorer", price: 230000, img: "images/jetski.jpg", items: ["2 Days Lodging", "Jet Ski", "Quad Racing", "Museum Visit", "Lobe Falls Tour", "Visit Pygmies", "Visit 2 Beaches", "Mini Boat Tour", "Mobile Content & Pictures"] },
                { name: "Vibes & Memories", tier: "Experience", price: 350000, img: "images/dinner.jpg", items: ["Everything in Explorer", "Sip and Paints", "Group Dinner", "Camp Fire"] },
                { name: "VIP Vibes Getaway", tier: "Elite", price: 420000, img: "images/seaport.jpg", items: ["Everything in Experience", "Boat Cruise with Wine", "Seaport Visit", "Games by the Beach"] }
            ],
            group6: [
                { name: "Friends & Waves Escape", tier: "Silver Crew", price: 270000, img: "images/quad.jpg", items: ["2 Days Lodging", "Jet Ski", "Quad Racing", "Museum Visit", "Lobe Falls Tour", "Visit Pygmies", "Visit 2 Beaches", "Mini Boat Tour", "Mobile Content & Pictures"] },
                { name: "Golden Crew Getaway", tier: "Gold Crew", price: 440000, img: "images/sip-paint.jpg", items: ["Everything in Silver", "Sip and Paints", "Group Dinner", "Camp Fire"] },
                { name: "Paradise Circle Retreat", tier: "Platinum Crew", price: 530000, img: "images/seaport.jpg", items: ["Everything in Gold", "Boat Cruise with Wine", "Seaport Visit", "Beach Games"] }
            ]
        };

        let currentRate = 1;
        let activeGroup = 'couple';
        let currencyLabel = 'CFA';

        function showGroup(group) {
            activeGroup = group;
            document.querySelectorAll('.group-tab').forEach(t => {
                t.classList.remove('active-tab');
                t.classList.add('border-slate-700');
            });
            const activeBtn = document.getElementById('tab-' + group);
            activeBtn.classList.add('active-tab');
            activeBtn.classList.remove('border-slate-700');
            render();
        }

        function setCurrency(label, rate) {
            currentRate = rate;
            currencyLabel = label;
            document.getElementById('curr-CFA').classList.toggle('bg-white', label === 'CFA');
            document.getElementById('curr-CFA').classList.toggle('text-slate-900', label === 'CFA');
            document.getElementById('curr-USD').classList.toggle('bg-white', label === 'USD');
            document.getElementById('curr-USD').classList.toggle('text-slate-900', label === 'USD');
            render();
        }

        function render() {
            const grid = document.getElementById('package-grid');
            grid.innerHTML = store[activeGroup].map((pkg, i) => {
                const formattedPrice = (pkg.price * currentRate).toLocaleString();
                const waMessage = encodeURIComponent(`Hi Wonder Way! I'm interested in the ${pkg.name} (${pkg.tier} Tier) for ${formattedPrice} ${currencyLabel}.`);
                
                return `
                <div class="package-card p-6 flex flex-col ${i === 1 ? 'gold-highlight shadow-xl' : ''}">
                    <div class="overflow-hidden rounded-[30px] mb-6">
                         <img src="${pkg.img}" class="w-full h-56 object-cover hover:scale-105 transition-transform duration-500" 
                              onerror="this.src='https://images.unsplash.com/photo-1544644181-1484b3fdfc62?auto=format&fit=crop&w=800&q=80'">
                    </div>
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-2">${pkg.tier}</span>
                    <h3 class="hero-font text-2xl font-black mb-2">${pkg.name}</h3>
                    <div class="text-3xl font-black mb-8">
                        ${formattedPrice} <small class="text-xs uppercase opacity-50 font-bold">${currencyLabel}</small>
                    </div>
                    <ul class="space-y-4 mb-10 flex-grow">
                        ${pkg.items.map(item => `
                            <li class="text-[11px] font-bold flex items-center gap-2">
                                <i class="fas fa-check-circle text-yellow-500"></i> ${item}
                            </li>
                        `).join('')}
                    </ul>
                    <a href="https://wa.me/237653827999?text=${waMessage}" 
                       target="_blank"
                       class="w-full py-5 bg-slate-900 text-white text-center rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-yellow-500 hover:text-black transition-all flex items-center justify-center gap-2">
                        <i class="fab fa-whatsapp text-lg"></i> Book Trip
                    </a>
                </div>
                `;
            }).join('');
        }

        render();
    </script>
</body>
</html>
