<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderWay | Kribi Experience Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Outfit:wght@200;400;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .active-tab { background: #fbbf24 !important; color: black !important; border-color: #fbbf24 !important; }
        
        /* LOGO CLARITY FIX */
        .circle-logo { 
            width: 44px;
            height: auto;
            object-fit: contain;
            filter: brightness(0) invert(1) contrast(1.2);
        }

        .activity-card { transition: all 0.2s; border: 2px solid transparent; cursor: pointer; }
        .activity-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .activity-card.selected { border-color: #fbbf24; background-color: #fffbeb; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white border-b border-slate-800">
        <div class="flex items-center gap-3">
            <img src="images/logo.png" class="circle-logo" alt="WonderWay">
            <span class="font-bold text-lg tracking-tighter uppercase hero-font border-l-4 border-yellow-500 pl-3">WonderWay</span>
        </div>

        <div class="hidden md:flex items-center gap-6">
            <a href="https://tiktok.com/@wonderwaytours" target="_blank" class="text-white hover:text-yellow-500 text-xl transition-all"><i class="fab fa-tiktok"></i></a>
            <a href="https://instagram.com/wonderwaytours" target="_blank" class="text-white hover:text-yellow-500 text-xl transition-all"><i class="fab fa-instagram"></i></a>
            <a href="https://facebook.com/wonderwaytours" target="_blank" class="text-white hover:text-yellow-500 text-xl transition-all"><i class="fab fa-facebook"></i></a>
        </div>

        <div class="flex bg-slate-800 rounded-lg p-1">
            <button onclick="setCurrency('CFA', 1)" id="curr-CFA" class="px-4 py-1 rounded-md text-xs font-bold bg-white text-slate-900 shadow-sm">CFA</button>
            <button onclick="setCurrency('USD', 0.0016)" id="curr-USD" class="px-4 py-1 rounded-md text-xs font-bold text-white">USD</button>
        </div>
    </nav>

    <header class="relative pt-32 pb-12 px-6 text-center bg-[#0f172a] text-white">
        <div class="max-w-4xl mx-auto">
            <h1 class="hero-font text-4xl md:text-7xl font-black uppercase mb-8 leading-none tracking-tighter">
                The Kribi <span class="text-yellow-500">Collection</span>
            </h1>
            
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="showSection('activities')" id="tab-activities" class="group-tab active-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition">Activities</button>
                <button onclick="showSection('couple')" id="tab-couple" class="group-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition text-white">Couples</button>
                <button onclick="showSection('group4')" id="tab-group4" class="group-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition text-white">Group of 4</button>
                <button onclick="showSection('group6')" id="tab-group6" class="group-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition text-white">Group of 6</button>
                <button onclick="showSection('events')" id="tab-events" class="group-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition text-white">Event Escapes</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="activities-builder" class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-2">
                <h2 class="text-2xl font-black mb-8 text-slate-900">Custom Adventure Builder</h2>
                <div id="activities-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>
            
            <div class="lg:col-span-1">
                <div class="sticky top-28 bg-white p-8 rounded-3xl border border-slate-200 shadow-xl">
                    <h3 class="hero-font text-xl font-black mb-4 uppercase">Your Summary</h3>
                    <div id="selected-items" class="space-y-4 mb-8 min-h-[150px] text-sm text-slate-500 italic">
                        Select activities to begin...
                    </div>
                    <div class="border-t pt-6">
                        <div class="flex justify-between items-center mb-6">
                            <span class="font-bold text-slate-400 uppercase text-xs">Total</span>
                            <span id="total-price" class="text-4xl font-black text-slate-900 tracking-tighter">0 CFA</span>
                        </div>
                        <button class="w-full py-5 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs tracking-widest shadow-lg">Book Now</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="package-grid" class="hidden grid grid-cols-1 md:grid-cols-3 gap-10"></div>
    </main>

    <footer class="bg-[#0f172a] py-20 px-6 text-center text-white border-t border-slate-800">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-center gap-8 mb-12">
                <a href="https://tiktok.com/@wonderwaytours" target="_blank" class="text-white hover:text-yellow-500 text-3xl transition-all"><i class="fab fa-tiktok"></i></a>
                <a href="https://instagram.com/wonderwaytours" target="_blank" class="text-white hover:text-yellow-500 text-3xl transition-all"><i class="fab fa-instagram"></i></a>
                <a href="https://facebook.com/wonderwaytours" target="_blank" class="text-white hover:text-yellow-500 text-3xl transition-all"><i class="fab fa-facebook"></i></a>
            </div>

            <img src="images/logo.png" class="w-16 h-16 mx-auto mb-6 circle-logo" alt="WonderWay">
            <p class="text-slate-500 text-[10px] uppercase tracking-widest font-semibold">&copy; 2026 WonderWay Tours. Kribi, Cameroon.</p>
        </div>
    </footer>

    <script>
        const activitiesData = [
            { id: 1, name: "Quad/ATV", price: 5000, cat: "Lobe Falls", info: "Per Turn", img: "images/quad.jpg" },
            { id: 2, name: "Jet-Ski", price: 10000, cat: "Lobe Falls", info: "Per Turn", img: "images/jetski-action.jpg" },
            { id: 3, name: "Boat Cruise", price: 5000, cat: "Lobe Falls", info: "River Tour", img: "images/group-boat.jpg" },
            { id: 4, name: "Pygmies Village", price: 10000, cat: "Lobe Falls", info: "Cultural Entry", img: "images/beach-portrait.jpg" },
            { id: 9, name: "Sip & Paint", price: 15000, cat: "Discovery", info: "Per Person", img: "images/sip-paint.jpg" },
            { id: 10, name: "Oceanfront Dinner", price: 25000, cat: "Activities", info: "Private Table", img: "images/dinner-setup.jpg" }
        ];

        let selected = [];
        let rate = 1;
        let currency = 'CFA';

        function showSection(section) {
            const builder = document.getElementById('activities-builder');
            const grid = document.getElementById('package-grid');
            document.querySelectorAll('.group-tab').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('tab-'+section).classList.add('active-tab');

            if(section === 'activities') {
                builder.classList.remove('hidden');
                grid.classList.add('hidden');
            } else {
                builder.classList.add('hidden');
                grid.classList.remove('hidden');
                grid.innerHTML = `<div class="col-span-full py-32 text-center text-slate-400 font-bold uppercase tracking-widest">Loading Collection...</div>`;
            }
        }

        function toggle(id) {
            const idx = selected.indexOf(id);
            if (idx > -1) selected.splice(idx, 1);
            else selected.push(id);
            render();
        }

        function render() {
            const list = document.getElementById('activities-list');
            list.innerHTML = activitiesData.map(a => `
                <div onclick="toggle(${a.id})" class="activity-card p-4 rounded-3xl bg-white border border-slate-100 shadow-sm ${selected.includes(a.id) ? 'selected' : ''}">
                    <div class="flex items-center gap-4">
                        <img src="${a.img}" class="w-16 h-16 rounded-2xl object-cover shadow-sm">
                        <div class="flex-grow">
                            <h4 class="font-black text-slate-900">${a.name}</h4>
                            <p class="text-[10px] text-slate-500 uppercase font-bold">${a.info}</p>
                            <span class="text-yellow-600 font-black text-sm">${(a.price * rate).toLocaleString()} ${currency}</span>
                        </div>
                        <i class="fas ${selected.includes(a.id) ? 'fa-check-circle text-yellow-500' : 'fa-plus text-slate-200'}"></i>
                    </div>
                </div>
            `).join('');

            const receipt = document.getElementById('selected-items');
            const items = activitiesData.filter(a => selected.includes(a.id));
            receipt.innerHTML = items.length === 0 ? "Select activities to begin..." : items.map(a => `
                <div class="flex justify-between items-center text-slate-800">
                    <span class="font-bold uppercase text-[10px]">${a.name}</span>
                    <span class="font-black">${(a.price * rate).toLocaleString()}</span>
                </div>
            `).join('');

            const total = items.reduce((s, a) => s + a.price, 0);
            document.getElementById('total-price').innerText = `${(total * rate).toLocaleString()} ${currency}`;
        }

        function setCurrency(l, r) {
            rate = r; currency = l;
            document.getElementById('curr-CFA').className = l === 'CFA' ? 'px-4 py-1 rounded-md text-xs font-bold bg-white text-slate-900 shadow-sm' : 'px-4 py-1 rounded-md text-xs font-bold text-white';
            document.getElementById('curr-USD').className = l === 'USD' ? 'px-4 py-1 rounded-md text-xs font-bold bg-white text-slate-900 shadow-sm' : 'px-4 py-1 rounded-md text-xs font-bold text-white';
            render();
        }

        render();
    </script>
</body>
</html>
