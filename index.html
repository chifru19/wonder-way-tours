<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderWay | Kribi Collection</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Outfit:wght@200;400;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: white; 
            scroll-behavior: smooth; 
        }
        
        .hero-font { font-family: 'Outfit', sans-serif; }
        
        .active-tab { 
            background: #fbbf24 !important; 
            color: black !important; 
            border-color: #fbbf24 !important; 
        }
        
        /* CARD STYLING */
        .package-card, .service-row { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #1e293b; 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px);
        }
        
        .package-card { border-radius: 32px; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .package-card:hover { transform: translateY(-12px); border-color: #fbbf24; box-shadow: 0 25px 50px -12px rgba(251, 191, 36, 0.3); }
        
        .service-row { border-radius: 20px; cursor: pointer; margin-bottom: 12px; padding: 20px; display: flex; justify-content: space-between; }
        .service-row:hover { border-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .selected-item { border-color: #fbbf24 !important; background: rgba(251, 191, 36, 0.15) !important; }
        
        /* HIDDEN FOLDER (MANIFEST) */
        #manifest-folder {
            display: none;
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s ease-in-out;
        }

        .folder-open {
            display: block !important;
            max-height: 2000px !important;
            margin-top: 50px;
        }

        .review-card { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            border-radius: 24px; 
            border: 1px solid #334155; 
            padding: 40px;
        }

        /* FOOTER SYSTEM */
        .immersive-footer { 
            position: relative; 
            min-height: 80vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #0f172a;
        }
        
        .footer-bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }
        
        .footer-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #0f172a 20%, rgba(15, 23, 42, 0.4) 100%);
        }
    </style>
</head>

<body class="pt-24">
    <nav class="fixed top-0 w-full z-50 bg-[#0f172a]/95 backdrop-blur-xl px-6 py-5 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-4">
            <img src="images/logo.png" alt="WonderWay" class="w-10 h-10 rounded-full border border-yellow-500">
            <div class="flex flex-col">
                <span class="font-black text-xl hero-font text-white uppercase leading-none">WonderWay</span>
                <span class="text-[8px] uppercase tracking-widest text-yellow-500 font-black">Kribi Collection</span>
            </div>
        </div>
        <select id="currency-select" onchange="updateCurrency()" class="bg-slate-800 text-white text-[10px] font-bold uppercase p-2 rounded-xl outline-none">
            <option value="XAF">CFA (XAF)</option>
            <option value="EUR">Euro (€)</option>
            <option value="USD">Dollar ($)</option>
        </select>
    </nav>

    <header class="pt-24 pb-12 px-6 text-center">
        <h1 class="hero-font text-6xl md:text-8xl font-black uppercase mb-6 tracking-tighter">Kribi <span class="text-yellow-500">Luxury</span></h1>
        <div class="flex flex-wrap justify-center gap-3">
            <button onclick="switchCategory('activities')" id="tab-activities" class="tab-btn active-tab px-8 py-4 rounded-2xl border border-slate-700 font-black text-[11px] uppercase tracking-widest transition-all">Activities</button>
            <button onclick="switchCategory('couples')" id="tab-couples" class="tab-btn px-8 py-4 rounded-2xl border border-slate-700 font-black text-[11px] uppercase tracking-widest transition-all">Couples</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 mb-40">
        <div id="package-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>

        <section id="manifest-folder">
            <div class="text-center mb-8 mt-20">
                <h2 class="hero-font text-4xl font-black uppercase text-yellow-500">Service Manifest</h2>
                <p class="text-slate-400 text-[10px] uppercase tracking-widest mt-2">Personalize your journey</p>
            </div>
            <div class="bg-slate-900/50 rounded-[40px] border border-slate-800 p-6 md:p-10">
                <div id="service-list" class="space-y-4"></div>
            </div>
        </section>

        <section id="feedback" class="mt-40">
            <h2 class="hero-font text-5xl font-black uppercase text-center mb-16">Guest Stories</h2>
            <div id="dynamic-reviews" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>
    </main>

    <div id="checkout-bar" class="fixed bottom-0 w-full bg-[#0f172a]/95 backdrop-blur-2xl border-t-4 border-yellow-500 p-8 z-[100] transform translate-y-full">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-left">
                <p id="cart-count" class="text-yellow-500 font-black text-[10px] uppercase mb-1">0 Selected</p>
                <h3 id="cart-total" class="text-3xl font-black hero-font uppercase">Total: 0 CFA</h3>
            </div>
            <button onclick="processWhatsApp()" class="px-16 py-5 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs tracking-widest hover:bg-white transition-all shadow-xl">Confirm via WhatsApp</button>
        </div>
    </div>

    <footer class="immersive-footer">
        <img src="images/footer.jpg" alt="Founder" class="footer-bg-image">
        <div class="footer-overlay"></div>
        <div class="relative z-10 max-w-4xl mx-auto px-6 text-center">
            <h3 class="hero-font text-4xl md:text-6xl font-black uppercase mb-6 text-white italic">"Luxury is affordable."</h3>
            <div class="flex flex-col items-center pt-12 border-t border-white/10 w-full">
                <span class="text-white font-black uppercase text-xs tracking-[0.3em] mb-4">Engineering by Frank Fru</span>
                <div class="flex gap-10">
                    <a href="https://frankfru.com" target="_blank" class="text-white hover:text-yellow-500 uppercase text-[10px] font-black tracking-widest">Website</a>
                    <a href="https://frankfru.com" target="_blank" class="text-white hover:text-yellow-500 uppercase text-[10px] font-black tracking-widest">Portfolio</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        let currentCurrency = 'XAF'; 
        let currentCategory = 'activities'; 
        let cart = [];
        const rates = { XAF: 1, EUR: 0.0015, USD: 0.0016 };

        const servicesData = {
            activities: [
                { id: "a1", name: "Jet Ski Adventure", price: 10000, img: "images/jetski-action.jpg", features: ["15 Mins Session", "Instructor"] },
                { id: "a2", name: "Horse Riding", price: 2000, img: "images/horse-riding.jpg", features: ["Beach Sunset", "Guided"] }
            ],
            couples: [
                { id: "c1", name: "Mini Love Adventure", price: 90000, img: "images/couple paradis escape.jpg", features: ["2 Days Villa", "Water Bundle"] }
            ]
        };

        function fetchReviews() {
            google.script.run.withSuccessHandler(function(html) {
                document.getElementById('dynamic-reviews').innerHTML = html;
            }).loadReviews();
        }

        function renderUI() {
            const grid = document.getElementById('package-grid');
            grid.innerHTML = (servicesData[currentCategory] || []).map(item => {
                const isS = cart.some(c => c.id === item.id);
                return `
                <div class="package-card ${isS ? 'selected-item' : ''}">
                    <div class="h-56"><img src="${item.img}" class="w-full h-full object-cover"></div>
                    <div class="p-8">
                        <h4 class="text-2xl font-black uppercase mb-1">${item.name}</h4>
                        <p class="text-xl font-bold mb-6 text-slate-300">${formatPrice(item.price)}</p>
                        <button onclick="toggleService('${item.id}', '${item.name}', ${item.price})" class="w-full py-4 ${isS ? 'bg-yellow-500 text-black' : 'bg-white text-black'} font-black rounded-xl uppercase text-[10px]">
                            ${isS ? 'Added ✓' : 'Add to Trip'}
                        </button>
                    </div>
                </div>`;
            }).join('');

            const list = document.getElementById('service-list');
            const allItems = Object.values(servicesData).flat();
            list.innerHTML = allItems.map(item => {
                const isS = cart.some(c => c.id === item.id);
                return `
                <div onclick="toggleService('${item.id}', '${item.name}', ${item.price})" class="service-row ${isS ? 'selected-item' : ''}">
                    <span class="text-sm font-bold uppercase tracking-widest">${item.name}</span>
                    <span class="text-yellow-500 font-black">${formatPrice(item.price)}</span>
                </div>`;
            }).join('');
        }

        function toggleService(id, name, price) {
            const idx = cart.findIndex(i => i.id === id);
            idx > -1 ? cart.splice(idx, 1) : cart.push({ id, name, price });
            updateCartUI(); 
            renderUI();
        }

        function updateCartUI() {
            const bar = document.getElementById('checkout-bar');
            const folder = document.getElementById('manifest-folder');
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            
            document.getElementById('cart-total').innerText = `Total: ${formatPrice(total)}`;
            document.getElementById('cart-count').innerText = `${cart.length} Selected`;

            if (cart.length > 0) {
                bar.classList.remove('translate-y-full');
                folder.classList.add('folder-open');
            } else {
                bar.classList.add('translate-y-full');
                folder.classList.remove('folder-open');
            }
        }

        function formatPrice(v) { 
            const conv = v * rates[currentCurrency]; 
            return currentCurrency === 'XAF' ? new Intl.NumberFormat('fr-CM').format(v) + ' CFA' : (currentCurrency === 'EUR' ? '€' : '$') + conv.toFixed(2);
        }

        function updateCurrency() { currentCurrency = document.getElementById('currency-select').value; renderUI(); updateCartUI(); }
        function switchCategory(cat) { currentCategory = cat; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab')); document.getElementById('tab-' + cat).classList.add('active-tab'); renderUI(); }

        window.onload = () => { renderUI(); fetchReviews(); };
    </script>
</body>
</html>
