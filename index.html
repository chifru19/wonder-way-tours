<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderWay | Kribi Experience Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Outfit:wght@200;400;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .active-tab { background: #fbbf24 !important; color: black !important; border-color: #fbbf24 !important; }
        .circle-logo { 
            border-radius: 50%; 
            object-fit: contain; 
            filter: brightness(0) invert(1) drop-shadow(0 0 2px rgba(255, 255, 255, 0.4));
        }
        .activity-card { transition: all 0.2s; border: 2px solid transparent; }
        .activity-card:hover { transform: translateY(-3px); }
        .activity-card.selected { border-color: #fbbf24; background-color: #fffbeb; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white border-b border-slate-800">
        <div class="flex items-center gap-3">
            <img src="images/logo.png" class="w-10 h-10 circle-logo" alt="WonderWay">
            <span class="font-bold text-lg tracking-tighter uppercase hero-font border-l-4 border-yellow-500 pl-3">WonderWay</span>
        </div>
        <div class="flex bg-slate-800 rounded-lg p-1">
            <button onclick="setCurrency('CFA', 1)" id="curr-CFA" class="px-4 py-1 rounded-md text-xs font-bold bg-white text-slate-900 shadow-sm">CFA</button>
            <button onclick="setCurrency('USD', 0.0016)" id="curr-USD" class="px-4 py-1 rounded-md text-xs font-bold text-white">USD</button>
        </div>
    </nav>

    <header class="relative pt-32 pb-12 px-6 text-center bg-[#0f172a] text-white">
        <div class="max-w-4xl mx-auto">
            <h1 class="hero-font text-4xl md:text-7xl font-black uppercase mb-8 leading-none tracking-tighter">
                The Kribi <span class="text-yellow-500">Collection</span>
            </h1>
            
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="showSection('activities')" id="tab-activities" class="group-tab active-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition">Activities</button>
                <button onclick="showSection('couple')" id="tab-couple" class="group-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition text-white">Couples</button>
                <button onclick="showSection('group4')" id="tab-group4" class="group-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition text-white">Group of 4</button>
                <button onclick="showSection('group6')" id="tab-group6" class="group-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition text-white">Group of 6</button>
                <button onclick="showSection('events')" id="tab-events" class="group-tab px-6 py-3 rounded-xl border border-slate-700 font-bold text-[10px] uppercase tracking-widest transition text-white">Event Escapes</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="activities-builder" class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-2">
                <h2 class="text-2xl font-black mb-6 flex items-center gap-2 text-slate-900">Custom Adventure Builder</h2>
                
                <div class="flex gap-4 mb-8 overflow-x-auto pb-2">
                    <button class="bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap">All Activities</button>
                    <button class="bg-white border px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap">Lobe Falls</button>
                    <button class="bg-white border px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap">Discovery</button>
                </div>

                <div id="activities-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>
            
            <div class="lg:col-span-1">
                <div class="sticky top-28 bg-white p-8 rounded-3xl border border-slate-200 shadow-xl">
                    <h3 class="hero-font text-xl font-black mb-4 uppercase">Your Pack</h3>
                    <div id="selected-items" class="space-y-4 mb-8 min-h-[120px] text-sm text-slate-500 italic">
                        Select items to begin building...
                    </div>
                    <div class="border-t pt-6">
                        <div class="flex justify-between items-center mb-6">
                            <span class="font-bold text-slate-400 uppercase text-xs">Total</span>
                            <span id="total-price" class="text-4xl font-black text-slate-900 tracking-tighter">0 CFA</span>
                        </div>
                        <button class="w-full py-5 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs tracking-widest hover:bg-yellow-400 transition-all shadow-lg shadow-yellow-200">Book Custom Trip</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="package-grid" class="hidden grid grid-cols-1 md:grid-cols-3 gap-10"></div>
    </main>

    <footer class="bg-[#0f172a] py-20 px-6 text-center text-white border-t border-slate-800">
        <div class="max-w-4xl mx-auto">
            <img src="images/sip-paint.jpg" class="w-full max-w-sm mx-auto rounded-2xl shadow-2xl border border-slate-700 mb-12" alt="Trust Image">
            <img src="images/logo.png" class="w-16 h-16 mx-auto mb-6 circle-logo" alt="WonderWay">
            <p class="text-slate-500 text-[10px] uppercase tracking-widest">&copy; 2026 WonderWay Tours. Kribi, Cameroon.</p>
        </div>
    </footer>

    <script>
        // Activity Data with Multi-Tier Pricing
        const activitiesData = [
            { id: 1, name: "Quad/ATV", basePrice: 5000, category: "Lobe Falls", details: "Per Turn", img: "images/jetski-action.jpg" },
            { id: 2, name: "Jet-Ski", basePrice: 10000, category: "Lobe Falls", details: "Per Turn", img: "images/jet-ski-fun.jpg" },
            { id: 3, name: "Boat Cruise (Solo)", basePrice: 5000, category: "Lobe Falls", details: "River Experience", img: "images/group-boat.jpg" },
            { id: 4, name: "Pygmies Village", basePrice: 10000, category: "Lobe Falls", details: "Cultural Visit", img: "images/beach-portrait.jpg" },
            { id: 5, name: "Zorb Ball", basePrice: 20000, category: "Discovery", details: "Beach Fun", img: "images/dinner-setup.jpg" },
            { id: 6, name: "Seaport Visit", basePrice: 20000, category: "Discovery", details: "Couple Entry", img: "images/beach-portrait.jpg" },
            { id: 7, name: "Canoe Ride", basePrice: 5000, category: "Discovery", details: "Traditional Boat", img: "images/group-boat.jpg" },
            { id: 8, name: "Museum Visit", basePrice: 7000, category: "Discovery", details: "Guided Tour", img: "images/beach-portrait.jpg" },
            { id: 9, name: "Sip & Paint", basePrice: 15000, category: "Discovery", details: "Per Person", img: "images/sip-paint.jpg" },
            { id: 10, name: "Private Dinner", basePrice: 25000, category: "Activities", details: "Oceanfront View", img: "images/dinner-setup.jpg" }
        ];

        let selectedActivities = [];
        let currentRate = 1;
        let currencyLabel = 'CFA';

        function showSection(section) {
            const builder = document.getElementById('activities-builder');
            const grid = document.getElementById('package-grid');
            document.querySelectorAll('.group-tab').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('tab-'+section).classList.add('active-tab');

            if(section === 'activities') {
                builder.classList.remove('hidden');
                grid.classList.add('hidden');
            } else {
                builder.classList.add('hidden');
                grid.classList.remove('hidden');
                grid.innerHTML = `<div class="col-span-full py-32 text-center text-slate-400 font-bold uppercase tracking-widest">Displaying ${section} Collection...</div>`;
            }
        }

        function toggleActivity(id) {
            const index = selectedActivities.indexOf(id);
            if (index > -1) selectedActivities.splice(index, 1);
            else selectedActivities.push(id);
            render();
        }

        function render() {
            const list = document.getElementById('activities-list');
            list.innerHTML = activitiesData.map(act => `
                <div onclick="toggleActivity(${act.id})" class="activity-card p-5 rounded-3xl bg-white border border-slate-100 cursor-pointer shadow-sm ${selectedActivities.includes(act.id) ? 'selected' : ''}">
                    <div class="flex items-center gap-4">
                        <img src="${act.img}" class="w-20 h-20 rounded-2xl object-cover shadow-sm">
                        <div class="flex-grow">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${act.category}</span>
                            <h4 class="font-black text-slate-900 text-lg">${act.name}</h4>
                            <p class="text-[11px] text-slate-500 mb-1">${act.details}</p>
                            <span class="text-yellow-600 font-black">${(act.basePrice * currentRate).toLocaleString()} ${currencyLabel}</span>
                        </div>
                        <i class="fas ${selectedActivities.includes(act.id) ? 'fa-minus-circle text-red-400' : 'fa-plus-circle text-yellow-500'} text-xl"></i>
                    </div>
                </div>
            `).join('');

            const selectedDiv = document.getElementById('selected-items');
            const picked = activitiesData.filter(a => selectedActivities.includes(a.id));
            
            if(picked.length === 0) {
                selectedDiv.innerHTML = "Select activities to see pricing...";
            } else {
                selectedDiv.innerHTML = picked.map(a => `
                    <div class="flex justify-between items-center text-slate-800">
                        <span class="font-bold uppercase text-[11px] tracking-tight">${a.name}</span>
                        <span class="font-black">${(a.basePrice * currentRate).toLocaleString()}</span>
                    </div>
                `).join('');
            }

            const total = picked.reduce((sum, a) => sum + a.basePrice, 0);
            document.getElementById('total-price').innerText = `${(total * currentRate).toLocaleString()} ${currencyLabel}`;
        }

        function setCurrency(label, rate) {
            currentRate = rate;
            currencyLabel = label;
            document.getElementById('curr-CFA').className = label === 'CFA' ? 'px-4 py-1 rounded-md text-xs font-bold bg-white text-slate-900 shadow-sm' : 'px-4 py-1 rounded-md text-xs font-bold text-white';
            document.getElementById('curr-USD').className = label === 'USD' ? 'px-4 py-1 rounded-md text-xs font-bold bg-white text-slate-900 shadow-sm' : 'px-4 py-1 rounded-md text-xs font-bold text-white';
            render();
        }

        render();
    </script>
</body>
</html>
