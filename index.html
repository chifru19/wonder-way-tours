<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderWay | Kribi Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&family=Outfit:wght@800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; scroll-behavior: smooth; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .active-tab { background: #fbbf24 !important; color: black !important; }
        .package-card, .service-row, .review-card { transition: all 0.4s ease; border: 1px solid #1e293b; background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border-radius: 24px; overflow: hidden; }
        .package-card:hover { transform: translateY(-10px); border-color: #fbbf24; }
        .selected-item { border-color: #fbbf24 !important; background: rgba(251, 191, 36, 0.1) !important; }
        input, textarea { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        .star-rating input:checked ~ label, .star-rating label:hover, .star-rating label:hover ~ label { color: #fbbf24 !important; }
        .immersive-footer { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f172a; overflow: hidden; }
        .footer-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #0f172a 20%, rgba(15, 23, 42, 0.4)); }
    </style>
</head>
<body class="pt-24">
    <nav class="fixed top-0 w-full z-50 bg-[#0f172a]/95 backdrop-blur-xl px-6 py-4 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-3">
            <img src="images/logo.png" class="w-10 h-10 rounded-full border-2 border-yellow-500 bg-white">
            <div class="flex flex-col"><span class="font-black text-lg hero-font uppercase">WonderWay</span><span class="text-[7px] tracking-[0.4em] text-yellow-500 font-black uppercase">Official</span></div>
        </div>
        <select id="currency-select" onchange="updateCurrency()" class="bg-slate-800 px-3 py-1 rounded-xl text-[10px] font-bold uppercase outline-none">
            <option value="XAF">CFA (XAF)</option><option value="EUR">Euro (€)</option><option value="USD">USD ($)</option>
        </select>
    </nav>

    <header class="py-16 px-6 text-center">
        <h1 class="hero-font text-6xl md:text-8xl font-black uppercase tracking-tighter mb-4">Kribi <span class="text-yellow-500">Luxury</span></h1>
        <div class="flex flex-wrap justify-center gap-2 mb-12" id="tab-container"></div>
        <div id="package-grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </header>

    <main class="max-w-7xl mx-auto px-6">
        <section id="booking-engine" class="mt-20 opacity-0 max-h-0 overflow-hidden transition-all duration-700">
            <h2 class="hero-font text-3xl font-black uppercase text-center mb-8">Service <span class="text-yellow-500">Manifest</span></h2>
            <div id="service-list" class="space-y-3 bg-slate-900/50 p-6 rounded-[32px] border border-slate-800"></div>
        </section>

        <section class="mt-32 max-w-2xl mx-auto bg-slate-900/80 p-8 rounded-[40px] border border-slate-800 text-center">
            <h2 class="hero-font text-3xl font-black uppercase mb-6">Guest <span class="text-yellow-500">Voice</span></h2>
            <form id="reviewForm" class="space-y-4 text-left">
                <div class="grid grid-cols-2 gap-4"><input type="text" name="Name" placeholder="Name" class="p-4 rounded-xl w-full" required><input type="text" name="Location" placeholder="City" class="p-4 rounded-xl w-full" required></div>
                <div class="flex justify-between items-center bg-slate-800/30 p-4 rounded-xl border border-slate-800"><span class="text-[10px] uppercase font-black text-slate-400">Rating:</span>
                    <div class="star-rating flex flex-row-reverse text-2xl">
                        <input type="radio" name="Stars" id="s5" value="5" class="hidden" required><label for="s5" class="cursor-pointer px-1">★</label>
                        <input type="radio" name="Stars" id="s4" value="4" class="hidden"><label for="s4" class="cursor-pointer px-1">★</label>
                        <input type="radio" name="Stars" id="s3" value="3" class="hidden"><label for="s3" class="cursor-pointer px-1">★</label>
                    </div>
                </div>
                <textarea name="Review" placeholder="Your experience..." rows="3" class="w-full p-4 rounded-xl" required></textarea>
                <button type="submit" id="submitBtn" class="w-full py-4 bg-yellow-500 text-black font-black rounded-xl uppercase text-xs">Post Live Review</button>
            </form>
        </section>

        <section class="mt-24 pb-40"><h2 class="hero-font text-4xl font-black uppercase text-center mb-12">Guest <span class="text-slate-500">Stories</span></h2><div id="dynamic-reviews" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></section>
    </main>

    <div id="checkout-bar" class="fixed bottom-0 w-full bg-[#0f172a]/95 backdrop-blur-xl border-t-4 border-yellow-500 p-6 z-[100] transform translate-y-full transition-transform">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div><p id="cart-count" class="text-yellow-500 font-black text-[10px] uppercase">0 Selected</p><h3 id="cart-total" class="text-2xl font-black hero-font uppercase">Total: 0 CFA</h3></div>
            <div class="flex gap-3"><button onclick="clearCart()" class="px-4 py-3 border border-slate-700 text-slate-400 font-bold rounded-xl text-[10px]">Reset</button>
            <button onclick="processWhatsApp()" class="px-8 py-3 bg-yellow-500 text-black font-black rounded-xl uppercase text-xs tracking-widest">Confirm WhatsApp</button></div>
        </div>
    </div>

    <footer class="immersive-footer text-center px-6">
        <img src="images/footer.jpg" class="absolute inset-0 w-full h-full object-cover opacity-50"><div class="footer-overlay"></div>
        <div class="relative z-10">
            <h3 class="hero-font text-5xl font-black uppercase mb-4 italic text-white">"Luxury is affordable."</h3>
            <div class="flex gap-6 justify-center mt-8 text-[10px] font-black uppercase tracking-widest">
                <a href="https://frankfru.com">Portfolio</a><a href="https://github.com/chifru19">GitHub</a><a href="https://www.linkedin.com/in/frank-fru-454593252/">LinkedIn</a>
            </div>
            <p class="mt-8 text-white/20 text-[8px] uppercase tracking-[0.5em]">© 2026 WonderWay Tours Cameroon. Engineering by Frank Fru.</p>
        </div>
    </footer>

    <script>
        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnv5OBvO2JxZ-PSZGaKGaxLl76QS5pv-28btG5l_N5vG_KREbPuE2Wgtw4511LqcQpQYhs9UY1aGp3/pub?output=csv';
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwpQ9FZiLRbL695i1Eni-r69KSyCONRsdygRrqKDybZOZCkEXbKd_2S1RRZGaYU7vrC/exec';
        let currency = 'XAF', category = 'activities', cart = [], rates = { XAF: 1, EUR: 0.0015, USD: 0.0016 };

        const servicesData = {
            activities: [{id:"a1", name:"Jet Ski", price:10000, img:"images/jetski-action.jpg", features:["15 Mins", "Safety Gear"]}, {id:"a2", name:"Horse Riding", price:2000, img:"images/horse-riding.jpg", features:["Beach Ride"]}, {id:"a3", name:"Quad Biking", price:5000, img:"images/Quad.jpg", features:["Coastal Trail"]}, {id:"a4", name:"Sip & Paint", price:15000, img:"images/sip-paint.jpg", features:["2-Hours", "Drink"]}, {id:"a5", name:"Museum", price:2000, img:"images/museum.jpg", features:["Heritage Tour"]}],
            couples: [{id:"c1", name:"Mini Love", price:90000, img:"images/couple paradis escape.jpg", features:["2 Days Villa"]}, {id:"c2", name:"Gold Stay", price:250000, img:"images/sip-paint.jpg", features:["Beach Dinner"]}, {id:"c3", name:"Royal VIP", price:350000, img:"images/royal romance.jpg", features:["Private Cruise"]}],
            group4: [{id:"g4_1", name:"Crew Chill", price:230000, img:"images/group-action.jpg", features:["Villa", "BBQ"]}, {id:"g4_2", name:"Vibes", price:350000, img:"images/dinner-setup.jpg", features:["Sip & Paint"]}],
            group6: [{id:"g6_1", name:"Waves", price:270000, img:"images/group-action.jpg", features:["6-Pax Villa"]}]
        };

        function renderUI() {
            document.getElementById('tab-container').innerHTML = Object.keys(servicesData).map(cat => `<button onclick="switchCategory('${cat}')" class="px-6 py-3 rounded-xl border border-slate-700 font-black text-[10px] uppercase tracking-widest transition ${category===cat?'active-tab':''}">${cat}</button>`).join('');
            document.getElementById('package-grid').innerHTML = servicesData[category].map(item => {
                const isS = cart.some(c => c.id === item.id);
                return `<div class="package-card ${isS?'selected-item':''}">
                    <img src="${item.img}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <h4 class="text-xl font-black mb-1 uppercase">${item.name}</h4>
                        <p class="font-bold text-slate-400 mb-4">${formatPrice(item.price)}</p>
                        <button onclick="toggleService('${item.id}','${item.name}',${item.price})" class="w-full py-3 rounded-lg font-black uppercase text-[9px] ${isS?'bg-yellow-500 text-black':'bg-white text-black'}">${isS?'Added ✓':'Add to Trip'}</button>
                    </div>
                </div>`
            }).join('');
            document.getElementById('service-list').innerHTML = Object.values(servicesData).flat().map(item => {
                const isS = cart.some(c => c.id === item.id);
                return `<div onclick="toggleService('${item.id}','${item.name}',${item.price})" class="service-row p-4 flex justify-between cursor-pointer ${isS?'selected-item':''}"><span class="uppercase text-[10px] font-black">${item.name}</span><span class="text-yellow-500 font-bold">${formatPrice(item.price)}</span></div>`
            }).join('');
        }

        function toggleService(id, name, price) {
            const idx = cart.findIndex(i => i.id === id);
            idx > -1 ? cart.splice(idx, 1) : (cart.push({id, name, price}), document.getElementById('booking-engine').style.maxHeight = "2000px", document.getElementById('booking-engine').style.opacity = "1");
            updateCartUI(); renderUI();
        }

        function updateCartUI() {
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = `Total: ${formatPrice(total)}`;
            document.getElementById('cart-count').innerText = `${cart.length} Selected`;
            document.getElementById('checkout-bar').classList.toggle('translate-y-full', cart.length === 0);
        }

        function formatPrice(v) { 
            if (currency === 'XAF') return v.toLocaleString() + ' CFA';
            return (currency === 'EUR' ? '€' : '$') + (v * rates[currency]).toFixed(2);
        }

        function updateCurrency() { currency = document.getElementById('currency-select').value; renderUI(); updateCartUI(); }
        function switchCategory(cat) { category = cat; renderUI(); }
        function clearCart() { cart = []; updateCartUI(); renderUI(); }
        function processWhatsApp() { window.open("https://wa.me/237653827999?text=" + encodeURIComponent("WonderWay Booking:\n" + cart.map(i => i.name).join(", ") + "\nTotal: " + document.getElementById('cart-total').innerText), '_blank'); }

        async function loadReviews() {
            try {
                const res = await fetch(`${sheetURL}&v=${Date.now()}`);
                const rows = (await res.text()).split('\n').slice(1).reverse();
                document.getElementById('dynamic-reviews').innerHTML = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return c.length >= 4 ? `<div class="review-card p-6">
                        <div class="text-yellow-500 mb-2"> ${'★'.repeat(c[3])}</div>
                        <p class="italic text-xs text-slate-300">"${c[2].replace(/"/g,'')}"</p>
                        <p class="text-[9px] font-black uppercase mt-4 text-white/50">— ${c[0]}, ${c[1]}</p>
                    </div>` : '';
                }).join('');
            } catch (e) {}
        }

        document.getElementById('reviewForm').addEventListener('submit', async e => {
            e.preventDefault(); const b = document.getElementById('submitBtn'); b.innerText = "POSTING...";
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: new FormData(e.target) });
            alert("Published!"); e.target.reset(); b.innerText = "Post Live Review"; setTimeout(loadReviews, 2000);
        });

        window.onload = () => { renderUI(); loadReviews(); };
    </script>
</body>
</html>
