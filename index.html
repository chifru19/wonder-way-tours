<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderWay | Kribi Collection</title>
    
    <meta name="description" content="Premium Kribi travel experiences. Curated tours and luxury escapes in Cameroon.">
    <meta property="og:title" content="WonderWay | The Kribi Collection">
    <meta property="og:description" content="Book your authentic coastal adventure.">
    <meta property="og:url" content="https://wonderwaytourcameroon.com">
    <meta property="og:type" content="website">
    <link rel="icon" href="images/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Outfit:wght@200;400;800&display=swap');
        
        /* GLOBAL STYLES */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: white; 
            scroll-behavior: smooth; 
        }
        
        .hero-font { font-family: 'Outfit', sans-serif; }
        
        .active-tab { 
            background: #fbbf24 !important; 
            color: black !important; 
            border-color: #fbbf24 !important; 
        }
        
        /* CARD & ELEMENT STYLING */
        .package-card, .service-row { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #1e293b; 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px);
        }
        
        .package-card { 
            border-radius: 32px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
        }
        
        .package-card:hover { 
            transform: translateY(-12px); 
            border-color: #fbbf24; 
            box-shadow: 0 25px 50px -12px rgba(251, 191, 36, 0.3); 
        }
        
        .service-row { 
            border-radius: 20px; 
            cursor: pointer; 
            margin-bottom: 12px; 
            border: 1px solid #1e293b; 
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .service-row:hover { border-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .selected-item { border-color: #fbbf24 !important; background: rgba(251, 191, 36, 0.15) !important; }
        
        /* REVIEWS ANIMATION */
        .review-card { 
            animation: fadeIn 0.8s ease-out forwards; 
            opacity: 0; 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            border-radius: 24px; 
            border: 1px solid #334155; 
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        #checkout-bar { 
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            box-shadow: 0 -20px 40px rgba(0,0,0,0.4); 
        }
        
        .immersive-footer { 
            position: relative; 
            padding: 100px 0;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            background-color: #0f172a;
        }

        /* HIDDEN MANIFEST SECTION */
        #manifest-section {
            display: none; /* Hidden by default */
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .manifest-container {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            border-radius: 32px;
            padding: 40px;
            margin-top: 40px;
        }
    </style>
</head>

<body class="pt-24">
    <nav class="fixed top-0 w-full z-50 bg-[#0f172a]/95 backdrop-blur-xl px-6 py-5 flex flex-col md:flex-row justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-4">
            <div class="flex flex-col text-left">
                <span class="font-black text-xl tracking-tighter uppercase hero-font text-white leading-none">WonderWay</span>
                <span class="text-[8px] uppercase tracking-[0.4em] text-yellow-500 font-black">Official Collection</span>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <select id="currency-select" onchange="updateCurrency()" class="bg-slate-800 text-white text-[10px] font-bold uppercase p-2 rounded-xl outline-none cursor-pointer">
                <option value="XAF">CFA Franc (XAF)</option>
                <option value="EUR">Euro (€)</option>
                <option value="USD">Dollar ($)</option>
            </select>
        </div>
    </nav>

    <header class="pt-24 pb-12 px-6 text-center">
        <h1 class="hero-font text-6xl md:text-8xl font-black uppercase mb-6 tracking-tighter leading-none">Kribi <span class="text-yellow-500">Luxury</span></h1>
        <div class="flex flex-wrap justify-center gap-3">
            <button onclick="switchCategory('activities')" id="tab-activities" class="tab-btn active-tab px-8 py-4 rounded-2xl border border-slate-700 font-black text-[11px] uppercase tracking-widest transition-all">Activities</button>
            <button onclick="switchCategory('couples')" id="tab-couples" class="tab-btn px-8 py-4 rounded-2xl border border-slate-700 font-black text-[11px] uppercase tracking-widest transition-all">Couples</button>
            <button onclick="switchCategory('group4')" id="tab-group4" class="tab-btn px-8 py-4 rounded-2xl border border-slate-700 font-black text-[11px] uppercase tracking-widest transition-all">Groups (4)</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 mb-40">
        <div id="package-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10 mb-32"></div>

        <section id="manifest-section" class="mt-20">
            <div class="text-center mb-10">
                <h2 class="hero-font text-4xl font-black uppercase text-yellow-500">Full Service Manifest</h2>
                <p class="text-slate-400 text-xs uppercase tracking-widest mt-2">Additional services for your custom journey</p>
            </div>
            <div class="manifest-container">
                <div id="service-list" class="space-y-4">
                    </div>
            </div>
        </section>

        <section id="feedback" class="mt-40">
            <h2 class="hero-font text-5xl font-black uppercase text-center mb-16">Guest <span class="text-slate-500">Stories</span></h2>
            <div id="dynamic-reviews" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>
    </main>

    <div id="checkout-bar" class="fixed bottom-0 w-full bg-[#0f172a]/95 backdrop-blur-2xl border-t-4 border-yellow-500 p-8 z-[100] transform translate-y-full">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-left">
                <p id="cart-count" class="text-yellow-500 font-black text-[10px] uppercase mb-1">0 Selected</p>
                <h3 id="cart-total" class="text-3xl font-black hero-font uppercase">Total: 0 CFA</h3>
            </div>
            <div class="flex gap-4">
                <button onclick="clearCart()" class="px-8 py-5 border border-slate-700 text-slate-400 font-bold rounded-2xl uppercase text-[10px]">Reset</button>
                <button onclick="processWhatsApp()" class="px-16 py-5 bg-yellow-500 text-black font-black rounded-2xl uppercase text-xs tracking-widest hover:bg-white transition-all shadow-xl">WhatsApp</button>
            </div>
        </div>
    </div>

    <footer class="immersive-footer border-t border-slate-800">
        <div class="relative z-10 max-w-4xl mx-auto px-6 text-center">
            <span class="text-white font-black uppercase text-xs tracking-[0.3em] mb-4 block">Engineering by Frank Fru</span>
            <div class="flex gap-10 justify-center">
                <a href="https://frankfru.com" target="_blank" class="text-white hover:text-yellow-500 uppercase text-[10px] font-black tracking-widest transition">Website</a>
                <a href="https://frankfru.com" target="_blank" class="text-white hover:text-yellow-500 uppercase text-[10px] font-black tracking-widest transition">Portfolio</a>
            </div>
            <p class="mt-12 text-white/20 text-[10px] uppercase font-black tracking-[0.5em]">© 2026 WonderWay Tours Cameroon.</p>
        </div>
    </footer>

    <script>
        let currentCurrency = 'XAF'; 
        let currentCategory = 'activities'; 
        let cart = [];
        const rates = { XAF: 1, EUR: 0.0015, USD: 0.0016 };

        const servicesData = {
            activities: [
                { id: "a1", name: "Jet Ski Adventure", price: 10000, img: "https://images.unsplash.com/photo-1559128010-7c1ad6e1b6a5?auto=format&fit=crop&q=80&w=800", features: ["15 Mins Session", "Instructor"] },
                { id: "a2", name: "Horse Riding", price: 2000, img: "https://images.unsplash.com/photo-1553284965-83fd3e82fa5a?auto=format&fit=crop&q=80&w=800", features: ["Beach Sunset Ride", "Guided"] }
            ],
            couples: [
                { id: "c1", name: "Mini Love Adventure", price: 90000, img: "https://images.unsplash.com/photo-1510414842594-a61c69b5ae57?auto=format&fit=crop&q=80&w=800", features: ["2 Days Villa", "Water Sports"] }
            ],
            group4: [
                { id: "g4_1", name: "Crew Chill", price: 230000, img: "https://images.unsplash.com/photo-1539635278303-d4002c07eae3?auto=format&fit=crop&q=80&w=800", features: ["Spacious Villa", "Full BBQ"] }
            ]
        };

        function fetchReviews() {
            google.script.run.withSuccessHandler(function(html) {
                document.getElementById('dynamic-reviews').innerHTML = html;
            }).loadReviews();
        }

        function renderUI() {
            const grid = document.getElementById('package-grid');
            grid.innerHTML = (servicesData[currentCategory] || []).map(item => {
                const isS = cart.some(c => c.id === item.id);
                return `
                <div class="package-card ${isS ? 'selected-item' : ''}">
                    <div class="h-56"><img src="${item.img}" class="w-full h-full object-cover"></div>
                    <div class="p-8">
                        <h4 class="text-2xl font-black uppercase mb-1">${item.name}</h4>
                        <p class="text-xl font-bold mb-6 text-slate-300">${formatPrice(item.price)}</p>
                        <button onclick="toggleService('${item.id}', '${item.name}', ${item.price})" class="w-full py-4 ${isS ? 'bg-yellow-500 text-black' : 'bg-white text-black'} font-black rounded-xl uppercase text-[10px]">
                            ${isS ? 'Added ✓' : 'Add to Trip'}
                        </button>
                    </div>
                </div>`;
            }).join('');

            // Render Manifest List (Price List)
            const list = document.getElementById('service-list');
            const allItems = Object.values(servicesData).flat();
            list.innerHTML = allItems.map(item => {
                const isS = cart.some(c => c.id === item.id);
                return `
                <div onclick="toggleService('${item.id}', '${item.name}', ${item.price})" class="service-row ${isS ? 'selected-item' : ''}">
                    <span class="text-sm font-bold uppercase tracking-widest">${item.name}</span>
                    <span class="text-yellow-500 font-black">${formatPrice(item.price)}</span>
                </div>`;
            }).join('');
        }

        function toggleService(id, name, price) {
            const idx = cart.findIndex(i => i.id === id);
            idx > -1 ? cart.splice(idx, 1) : cart.push({ id, name, price });
            updateCartUI(); 
            renderUI();
        }

        function updateCartUI() {
            const bar = document.getElementById('checkout-bar');
            const manifest = document.getElementById('manifest-section');
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            
            document.getElementById('cart-total').innerText = `Total: ${formatPrice(total)}`;
            document.getElementById('cart-count').innerText = `${cart.length} Selected`;

            if (cart.length > 0) {
                bar.classList.remove('translate-y-full');
                manifest.style.display = 'block';
                setTimeout(() => manifest.style.opacity = '1', 10);
            } else {
                bar.classList.add('translate-y-full');
                manifest.style.opacity = '0';
                setTimeout(() => manifest.style.display = 'none', 500);
            }
        }

        function clearCart() { cart = []; updateCartUI(); renderUI(); }
        function formatPrice(v) { 
            const conv = v * rates[currentCurrency]; 
            return currentCurrency === 'XAF' ? new Intl.NumberFormat('fr-CM').format(v) + ' CFA' : (currentCurrency === 'EUR' ? '€' : '$') + conv.toFixed(2);
        }
        function updateCurrency() { currentCurrency = document.getElementById('currency-select').value; renderUI(); updateCartUI(); }
        function switchCategory(cat) { currentCategory = cat; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab')); document.getElementById('tab-' + cat).classList.add('active-tab'); renderUI(); }

        window.onload = () => { renderUI(); fetchReviews(); };
    </script>
</body>
</html>
