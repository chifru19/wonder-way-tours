name: Infrastructure Security Scan (Checkov)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# This section fixes the CKV2_GHA_1 error
permissions:
  contents: read      # Allows the scanner to look at your code
  security-events: write  # Allows the scanner to post results to the Security tab
  actions: read       # Needed for some GitHub-integrated scans

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4 to fix the Node.js 20 deprecation warning

      - name: Run Checkov action
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          # Using soft_fail: true will turn the circle green even if it finds 
          # security issues in your code, while still reporting them.
          soft_fail: true 
          framework: all
          output_format: sarif
          output_file_path: results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3 # Updated to v3 for 2026 compatibility
        if: always()
        with:
          sarif_file: results.sarif